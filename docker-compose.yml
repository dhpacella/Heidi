version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: heidi-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-heidi_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: ${DB_NAME:-voter_dashboard}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-heidi_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heidi-network
    cpus: '4'
    mem_limit: 8g
    restart: unless-stopped

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: heidi-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-heidi_user}:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/${DB_NAME:-voter_dashboard}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_random_secret}
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-noreply@example.com}
      SNS_REGION: ${SNS_REGION:-us-east-2}
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - heidi-network
    cpus: '2'
    mem_limit: 2g
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  heidi-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

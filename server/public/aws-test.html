<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS SES/SNS Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; color: white; margin-bottom: 40px; font-size: 2.5em; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .card h2 { color: #333; margin-bottom: 20px; font-size: 1.5em; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
    input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; font-family: inherit; }
    textarea { resize: vertical; min-height: 100px; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    .button-group { display: flex; gap: 10px; }
    button { flex: 1; padding: 12px 20px; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    button:hover { background: #5568d3; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
    button:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    .result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; background: #f5f5f5; }
    .result.show { display: block; }
    .result.success { background: #e8f5e9; border-left: 4px solid #4caf50; color: #2e7d32; }
    .result.error { background: #ffebee; border-left: 4px solid #f44336; color: #c62828; }
    .result pre { margin-top: 10px; overflow-x: auto; background: white; padding: 10px; border-radius: 3px; font-size: 12px; }
    .demo-values { background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 12px; color: #666; }
    .demo-values button { padding: 5px 10px; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AWS SES/SNS Test Console</h1>

    <div class="grid">
      <div class="card">
        <h2>Email Test (SES)</h2>
        <div class="demo-values">
          <strong>Demo:</strong>
          <button onclick="fillEmailDemo()">Load Demo</button>
        </div>

        <form id="emailForm" onsubmit="testEmail(event)">
          <div class="form-group">
            <label>From Email:</label>
            <input type="email" id="fromEmail" value="heidi@hadleytrees.com" required>
          </div>

          <div class="form-group">
            <label>To Email:</label>
            <input type="email" id="toEmail" required placeholder="test@example.com">
          </div>

          <div class="form-group">
            <label>Subject:</label>
            <input type="text" id="emailSubject" required placeholder="Test Email Subject">
          </div>

          <div class="form-group">
            <label>HTML Body:</label>
            <textarea id="emailBody" required placeholder="&lt;h1&gt;Hello&lt;/h1&gt;&lt;p&gt;Test email&lt;/p&gt;"></textarea>
          </div>

          <div class="button-group">
            <button type="submit">Send Email</button>
            <button type="reset">Clear</button>
          </div>
        </form>

        <div id="emailResult" class="result"></div>
      </div>

      <div class="card">
        <h2>SMS Test (SNS)</h2>
        <div class="demo-values">
          <strong>Demo:</strong>
          <button onclick="fillSMSDemo()">Load Demo</button>
        </div>

        <form id="smsForm" onsubmit="testSMS(event)">
          <div class="form-group">
            <label>To Phone:</label>
            <input type="tel" id="toPhone" required placeholder="+1234567890">
            <small style="color: #666; margin-top: 5px; display: block;">US format: (123) 456-7890 or 1234567890</small>
          </div>

          <div class="form-group">
            <label>Message:</label>
            <textarea id="smsMessage" required placeholder="Your SMS message here"></textarea>
            <small id="charCount" style="color: #666; margin-top: 5px; display: block;">0 characters / 0 SMS parts</small>
          </div>

          <div class="button-group">
            <button type="submit">Send SMS</button>
            <button type="reset">Clear</button>
          </div>
        </form>

        <div id="smsResult" class="result"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    function fillEmailDemo() {
      document.getElementById('toEmail').value = 'dominic@cushingtrans.com';
      document.getElementById('emailSubject').value = 'Test Email from Heidi';
      document.getElementById('emailBody').value = '<h1>Test Email</h1><p>This is a test email from the AWS SES test console.</p>';
    }

    function fillSMSDemo() {
      document.getElementById('toPhone').value = '+12025551234';
      document.getElementById('smsMessage').value = 'Hello! This is a test SMS from Heidi Voter Dashboard.';
      updateCharCount();
    }

    function updateCharCount() {
      const msg = document.getElementById('smsMessage').value;
      const parts = Math.ceil(msg.length / 160) || 1;
      document.getElementById('charCount').textContent = msg.length + ' characters / ' + parts + ' SMS part' + (parts > 1 ? 's' : '');
    }

    document.getElementById('smsMessage').addEventListener('input', updateCharCount);

    async function testEmail(event) {
      event.preventDefault();
      const button = event.target.querySelector('button[type="submit"]');
      button.disabled = true;
      button.textContent = 'Sending...';

      try {
        const response = await fetch(API_BASE + '/email/send', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + (localStorage.getItem('token') || '')
          },
          body: JSON.stringify({
            fromAddress: document.getElementById('fromEmail').value,
            subject: document.getElementById('emailSubject').value,
            htmlBody: document.getElementById('emailBody').value,
            recipientEmails: JSON.stringify([document.getElementById('toEmail').value])
          })
        });

        const data = await response.json();
        showResult('emailResult', response.ok, data);
      } catch (err) {
        showResult('emailResult', false, { error: err.message });
      } finally {
        button.disabled = false;
        button.textContent = 'Send Email';
      }
    }

    async function testSMS(event) {
      event.preventDefault();
      const button = event.target.querySelector('button[type="submit"]');
      button.disabled = true;
      button.textContent = 'Sending...';

      try {
        const response = await fetch(API_BASE + '/sms/send', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + (localStorage.getItem('token') || '')
          },
          body: JSON.stringify({
            message: document.getElementById('smsMessage').value,
            recipientPhones: JSON.stringify([document.getElementById('toPhone').value])
          })
        });

        const data = await response.json();
        showResult('smsResult', response.ok, data);
      } catch (err) {
        showResult('smsResult', false, { error: err.message });
      } finally {
        button.disabled = false;
        button.textContent = 'Send SMS';
      }
    }

    function showResult(elementId, success, data) {
      const element = document.getElementById(elementId);
      element.className = 'result show ' + (success ? 'success' : 'error');
      element.innerHTML = '<strong>' + (success ? 'Success!' : 'Error') + '</strong><pre>' + JSON.stringify(data, null, 2) + '</pre>';
      element.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Volunteer Tracking - Heidi Voter Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --navy: #0B1929;
      --navy-mid: #122338;
      --navy-light: #1A3550;
      --gold: #F5A623;
      --gold-light: #FBBF48;
      --green: #1DB87A;
      --red: #E03434;
      --text: #EEF2F7;
      --text-muted: #8BA3BE;
      --border: #243D56;
      --surface: #122338;
      --surface-2: #1A3550;
    }

    body.light-theme {
      --navy: #F5F5F5;
      --navy-mid: #FFFFFF;
      --navy-light: #F0F0F0;
      --text: #1A1A1A;
      --text-muted: #666666;
      --border: #DDDDDD;
      --surface: #FFFFFF;
      --surface-2: #F9F9F9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      background: linear-gradient(135deg, #0B1929 0%, #122338 40%, #1A3550 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      position: relative;
      overflow: hidden;
      z-index: 100;
    }

    .page-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), #F5A62300);
    }

    .header-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .header-nav h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--navy-light);
      color: var(--text);
    }

    .btn:hover {
      background: var(--gold);
      color: var(--navy);
      border-color: var(--gold);
    }

    /* ── Main Map Container ── */
    .main-content {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    #map {
      flex: 1;
      z-index: 2;
    }

    /* ── Right Sidebar ── */
    .sidebar {
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 3;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .volunteer-card {
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .volunteer-card:hover {
      background: var(--surface-2);
      border-color: var(--gold);
    }

    .volunteer-card.selected {
      background: var(--surface-2);
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.2);
    }

    .volunteer-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .status-dot.inactive {
      background: var(--text-muted);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .volunteer-name {
      font-weight: 600;
      font-size: 14px;
      flex: 1;
    }

    .precinct-badge {
      background: rgba(245, 166, 35, 0.2);
      color: var(--gold);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
    }

    .volunteer-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .stat {
      background: var(--navy);
      padding: 8px;
      border-radius: 4px;
      text-align: center;
      border: 1px solid var(--border);
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .progress-bar {
      background: var(--navy);
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--green));
      transition: width 0.3s ease;
    }

    .last-gps {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── Legend ── */
    .legend {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      position: absolute;
      bottom: 20px;
      left: 20px;
      max-width: 250px;
      z-index: 10;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .legend-item:last-child {
      margin-bottom: 0;
    }

    .legend-color {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .empty-state {
      padding: 20px;
      text-align: center;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        right: 0;
        top: 0;
        height: 100%;
        box-shadow: -2px 0 10px rgba(0, 0, 0, 0.3);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="page-header">
      <div class="header-nav">
        <h1>🗺️ Live Volunteer Tracking</h1>
        <div class="header-controls">
          <button class="btn" onclick="toggleTheme()">🌙</button>
          <button class="btn" onclick="goBack()">← Back</button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div id="map"></div>

      <!-- Legend -->
      <div class="legend">
        <div class="legend-item">
          <div class="legend-color" style="background: #4CAF50;"></div>
          <span>Visited</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #FF9800;"></div>
          <span>In Progress</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #2196F3;"></div>
          <span>Volunteer Location</span>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">👥 Volunteers</div>
        <div class="sidebar-content" id="sidebarContent"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map = null;
    let volunteers = [];
    let gpsPositions = {};
    let markers = {};
    let pollingInterval = null;
    const POLL_INTERVAL = 30000; // 30 seconds

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadTheme();
      initMap();
      loadVolunteers();
      // Poll for updates every 30 seconds
      pollingInterval = setInterval(updateGPSPositions, POLL_INTERVAL);
    });

    // Theme toggle
    function toggleTheme() {
      document.body.classList.toggle('light-theme');
      localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }

    function loadTheme() {
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
      }
    }

    // Initialize map
    function initMap() {
      map = L.map('map').setView([40.7128, -74.0060], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);
    }

    // Load volunteers
    async function loadVolunteers() {
      try {
        const res = await fetch('/api/volunteers', { credentials: 'include' });
        const data = await res.json();
        volunteers = data.volunteers || [];
        renderSidebar();
        await updateGPSPositions();
      } catch (err) {
        console.error('Error loading volunteers:', err);
      }
    }

    // Update GPS positions
    async function updateGPSPositions() {
      try {
        const res = await fetch('/api/volunteers/gps/live', { credentials: 'include' });
        const data = await res.json();
        const liveVolunteers = data.volunteers || [];

        liveVolunteers.forEach(vol => {
          gpsPositions[vol.id] = {
            latitude: vol.latitude,
            longitude: vol.longitude,
            recorded_at: vol.recorded_at,
            name: vol.name
          };

          // Update or create marker
          updateMarker(vol);
        });

        renderSidebar();
      } catch (err) {
        console.error('Error updating GPS:', err);
      }
    }

    // Update marker on map
    function updateMarker(vol) {
      const markerId = `volunteer-${vol.id}`;

      if (markers[markerId]) {
        // Update existing marker position
        markers[markerId].setLatLng([vol.latitude, vol.longitude]);
      } else {
        // Create new marker
        const html = `
          <div style="
            width: 32px;
            height: 32px;
            background: #2196F3;
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
          ">📍</div>
        `;

        const marker = L.marker([vol.latitude, vol.longitude], {
          icon: L.divIcon({
            html: html,
            iconSize: [32, 32],
            className: 'volunteer-marker'
          })
        }).bindPopup(`
          <strong>${vol.name}</strong><br>
          Precinct: ${vol.precinct_name || 'Unknown'}<br>
          Last Update: ${new Date(vol.recorded_at).toLocaleTimeString()}
        `).addTo(map);

        markers[markerId] = marker;
      }
    }

    // Render sidebar
    function renderSidebar() {
      const content = document.getElementById('sidebarContent');
      content.innerHTML = '';

      if (volunteers.length === 0) {
        content.innerHTML = '<div class="empty-state">No volunteers yet</div>';
        return;
      }

      volunteers.forEach(vol => {
        const gps = gpsPositions[vol.id];
        const lastUpdate = gps ? new Date(gps.recorded_at).toLocaleTimeString() : 'No GPS data';
        const isActive = gps ? true : false;

        const card = document.createElement('div');
        card.className = 'volunteer-card';
        card.onclick = () => focusVolunteer(vol);

        const progressPct = vol.assigned_count > 0
          ? Math.round((vol.visited_count / vol.assigned_count) * 100)
          : 0;

        card.innerHTML = `
          <div class="volunteer-header">
            <div class="status-dot ${isActive ? '' : 'inactive'}"></div>
            <div class="volunteer-name">${vol.name}</div>
            <div class="precinct-badge">${vol.precinct_name || 'N/A'}</div>
          </div>

          <div class="volunteer-stats">
            <div class="stat">
              <div class="stat-value">${vol.assigned_count || 0}</div>
              <div class="stat-label">Assigned</div>
            </div>
            <div class="stat">
              <div class="stat-value">${vol.visited_count || 0}</div>
              <div class="stat-label">Visited</div>
            </div>
          </div>

          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progressPct}%"></div>
          </div>

          <div class="last-gps">
            ${isActive ? '🟢 Active • ' : '🔴 Inactive • '}${lastUpdate}
          </div>
        `;

        content.appendChild(card);
      });
    }

    // Focus volunteer on map
    function focusVolunteer(vol) {
      const gps = gpsPositions[vol.id];
      if (gps) {
        map.setView([gps.latitude, gps.longitude], 16);
        const markerId = `volunteer-${vol.id}`;
        if (markers[markerId]) {
          markers[markerId].openPopup();
        }
      }
    }

    // Navigation
    function goBack() {
      window.location.href = '/dashboard';
    }

    // Cleanup
    window.addEventListener('beforeunload', () => {
      if (pollingInterval) {
        clearInterval(pollingInterval);
      }
    });
  </script>
</body>
</html>

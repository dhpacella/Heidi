<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Volunteer GPS Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0F1419;
      color: #E8EBF0;
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }
    body.light-mode {
      background: #F5F5F5;
      color: #1A1A1A;
    }
    header {
      background: #1A3550;
      border-bottom: 2px solid #F5A623;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 100;
    }
    body.light-mode header {
      background: #E8F1F8;
      border-bottom-color: #F5A623;
      color: #1A3550;
    }
    header h1 { font-size: 24px; font-weight: 700; color: #F5A623; }
    .header-right { display: flex; gap: 12px; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-logout { background: #2A5070; color: #8BA3BE; }
    .btn-logout:hover { background: #3A6080; }
    body.light-mode .btn-logout { background: #D0E0EB; color: #1A3550; }
    body.light-mode .btn-logout:hover { background: #B8D5E5; }
    .btn-dark-toggle { background: transparent; color: #8BA3BE; border: 1px solid #8BA3BE; }
    body.light-mode .btn-dark-toggle { color: #1A3550; border-color: #1A3550; }
    #map {
      width: 100%;
      height: calc(100vh - 70px);
      background: #1F2937;
    }
    body.light-mode #map {
      background: #E8F1F8;
    }
    .info-panel {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: #1F2937;
      border: 1px solid #2D3E52;
      border-radius: 8px;
      padding: 16px;
      max-width: 300px;
      z-index: 1000;
      color: #E8EBF0;
    }
    body.light-mode .info-panel {
      background: #FFFFFF;
      border-color: #E0E0E0;
      color: #1A1A1A;
    }
    .info-panel h3 {
      font-size: 14px;
      font-weight: 700;
      color: #F5A623;
      margin-bottom: 12px;
    }
    .info-stat { font-size: 13px; margin-bottom: 8px; }
    .info-stat strong { color: #F5A623; }
    .refresh-status {
      font-size: 11px;
      color: #888780;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2D3E52;
    }
    body.light-mode .refresh-status {
      border-top-color: #E0E0E0;
      color: #999;
    }
    .leaflet-popup-content-wrapper {
      background: #1F2937;
      color: #E8EBF0;
      border-radius: 6px;
    }
    body.light-mode .leaflet-popup-content-wrapper {
      background: #FFFFFF;
      color: #1A1A1A;
    }
    .leaflet-popup-content {
      margin: 8px 12px;
      font-size: 13px;
    }
    .leaflet-popup-tip {
      background: #1F2937;
    }
    body.light-mode .leaflet-popup-tip {
      background: #FFFFFF;
    }
  </style>
</head>
<body>
  <header>
    <h1>📍 Live Volunteer GPS Map</h1>
    <div class="header-right">
      <button class="btn btn-dark-toggle" onclick="toggleTheme()">🌙 Dark</button>
      <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div id="map"></div>

  <div class="info-panel">
    <h3>🗺️ Map Status</h3>
    <div class="info-stat">Active volunteers: <strong id="activeCount">0</strong></div>
    <div class="info-stat">Last position: <strong id="lastUpdate">Never</strong></div>
    <div class="info-stat">Tracking: <strong id="trackingStatus">Off</strong></div>
    <div class="refresh-status">Auto-updating every 30 seconds</div>
  </div>

  <script>
    let map;
    let markers = {};
    let lastUpdateTime = null;

    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      const isDark = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      document.querySelector('.btn-dark-toggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
      if (map) {
        map.invalidateSize();
      }
    }

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark';
      if (saved === 'light') document.body.classList.add('light-mode');
      document.querySelector('.btn-dark-toggle').textContent = saved === 'light' ? '☀️ Light' : '🌙 Dark';
    }

    function logout() {
      fetch('/logout', { method: 'POST' }).then(() => window.location.href = '/login');
    }

    function initMap() {
      // Homer Glen, IL coordinates
      const centerLat = 41.6006;
      const centerLng = -87.9390;

      map = L.map('map').setView([centerLat, centerLng], 13);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);
    }

    async function updatePositions() {
      try {
        const res = await fetch('/api/volunteers/gps/live');
        const data = await res.json();
        const positions = data.positions || [];

        // Clear old markers
        Object.values(markers).forEach(marker => map.removeLayer(marker));
        markers = {};

        if (positions.length === 0) {
          document.getElementById('activeCount').textContent = '0';
          document.getElementById('trackingStatus').textContent = 'No volunteers active';
          return;
        }

        // Add new markers
        positions.forEach(pos => {
          if (pos.latitude && pos.longitude) {
            const marker = L.circleMarker([pos.latitude, pos.longitude], {
              radius: 8,
              fillColor: '#F5A623',
              color: '#F0A000',
              weight: 2,
              opacity: 1,
              fillOpacity: 0.8
            }).addTo(map);

            const lastUpdate = pos.last_updated ? new Date(pos.last_updated).toLocaleTimeString() : 'unknown';
            marker.bindPopup(`
              <div><strong>${pos.volunteer_name || 'Unknown'}</strong></div>
              <div style="font-size: 11px; color: #888;">Updated: ${lastUpdate}</div>
            `);

            markers[pos.volunteer_id] = marker;
          }
        });

        document.getElementById('activeCount').textContent = positions.length;
        document.getElementById('trackingStatus').textContent = 'Active';

        lastUpdateTime = new Date();
        document.getElementById('lastUpdate').textContent = lastUpdateTime.toLocaleTimeString();
      } catch (err) {
        console.error('Error updating positions:', err);
        document.getElementById('trackingStatus').textContent = 'Error loading data';
      }
    }

    initTheme();
    initMap();
    updatePositions();
    setInterval(updatePositions, 30000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribed</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 500px;
    }
    h1 {
      color: #333;
      margin: 0 0 10px 0;
    }
    p {
      color: #666;
      line-height: 1.6;
      margin: 15px 0;
    }
    .checkmark {
      font-size: 48px;
      margin: 20px 0;
      color: #4CAF50;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">✓</div>
    <h1>You've been unsubscribed</h1>
    <p>You will not receive any future emails from us.</p>
    <p style="font-size: 14px; color: #999; margin-top: 30px;">If you did not request this, please ignore this message.</p>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heidi Pacella — Campaign Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0B1929;
      --navy-mid: #122338;
      --navy-light: #1A3550;
      --gold: #F5A623;
      --gold-light: #FBBF48;
      --text: #EEF2F7;
      --text-muted: #8BA3BE;
      --border: #243D56;
      --surface: #122338;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Grain overlay — same as dashboard */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: .5;
    }

    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
    }

    /* Banner header — mirrors dashboard banner */
    .banner {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0B1929 0%, #122338 40%, #1A3550 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 32px 36px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
      text-align: center;
    }
    .banner::before {
      content: '';
      position: absolute; top: -40px; right: -40px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(245,166,35,.14) 0%, transparent 70%);
      pointer-events: none;
    }
    .banner-eyebrow {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }
    .banner-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px; font-weight: 800;
      color: var(--text); letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .banner-title span { color: var(--gold); }

    /* Card body */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }

    label {
      display: block;
      font-size: 11px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      font-size: 15px;
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245,166,35,.15);
    }

    button {
      width: 100%;
      padding: 15px;
      background: var(--gold);
      color: #0B1929;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
      border: none; border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    button:hover { background: var(--gold-light); transform: translateY(-1px); }
    button:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; transform: none; }

    .error {
      background: rgba(224,52,52,.12);
      border: 1px solid rgba(224,52,52,.4);
      color: #f87171;
      font-size: 13px;
      padding: 11px 14px;
      border-radius: 6px;
      margin-bottom: 18px;
      display: none;
    }
    .error.show { display: block; }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 24px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="banner">
      <div class="banner-eyebrow">Homer Glen, Illinois · 2027</div>
      <div class="banner-title">Heidi Pacella<br><span>Campaign Dashboard</span></div>
    </div>
    <div class="card">
      <form id="loginForm" onsubmit="handleLogin(event)">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="admin@heidiformayor.com" required autocomplete="email" />

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />

        <div class="error" id="errorMsg"></div>

        <button type="submit" id="submitBtn">Sign In →</button>
      </form>
      <div class="footer-note">Authorized campaign staff only</div>
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submitBtn');
      const errEl    = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.classList.remove('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Invalid email or password.';
          errEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign In →';
          return;
        }

        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('user_role', data.user.role);
        window.location.href = '/dashboard';

      } catch (err) {
        errEl.textContent = 'Connection error. Is the server running?';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    }

    // Skip login if already authenticated
    (async () => {
      try {
        const res = await fetch('/api/auth/session', { credentials: 'include' });
        if (res.ok) window.location.href = '/dashboard';
      } catch {}
    })();
  </script>
</body>
</html>

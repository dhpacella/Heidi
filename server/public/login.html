<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heidi Pacella — Campaign Dashboard Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap">
  <style>
    :root {
      --navy: #0B1929;
      --navy-mid: #122338;
      --navy-light: #1A3550;
      --gold: #F5A623;
      --gold-light: #FBBF48;
      --text: #EEF2F7;
      --text-muted: #8BA3BE;
      --border: #243D56;
      --surface: #122338;
    }

    body.light-theme {
      --navy: #F5F5F5;
      --navy-mid: #FFFFFF;
      --navy-light: #F0F0F0;
      --text: #1A1A1A;
      --text-muted: #666666;
      --border: #DDDDDD;
      --surface: #FFFFFF;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 40%, var(--navy-light) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    .card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(245, 166, 35, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 2px 8px rgba(245, 166, 35, 0.4));
    }

    .logo-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .logo-title span {
      color: #F5A623;
    }

    .logo-sub {
      font-size: 12px;
      color: #8BA3BE;
      letter-spacing: 0.03em;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #8BA3BE;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      border: 1px solid #243D56;
      border-radius: 8px;
      background: #0B1929;
      color: #EEF2F7;
      transition: all 0.15s;
    }

    .form-group input::placeholder {
      color: #8BA3BE;
    }

    .form-group input:focus {
      outline: none;
      border-color: #F5A623;
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
    }

    .btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Barlow', sans-serif;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .btn-primary {
      background: #F5A623;
      color: #0B1929;
      margin-bottom: 12px;
    }

    .btn-primary:hover {
      background: #FBBF48;
      box-shadow: 0 4px 16px rgba(245, 166, 35, 0.35);
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .error {
      background: rgba(224, 52, 52, 0.15);
      color: #FF8080;
      border: 1px solid rgba(224, 52, 52, 0.3);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <button onclick="toggleTheme()" style="position:fixed;top:20px;right:20px;z-index:100;font-size:12px;padding:6px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:var(--text-muted);cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;transition:all .15s" onmouseover="this.style.background='rgba(255,255,255,.15)';this.style.color='var(--text)'" onmouseout="this.style.background='rgba(255,255,255,.1)';this.style.color='var(--text-muted)'" id="themeToggleBtn">🌙 Dark</button>
  <div class="container">
    <div class="card">
      <div class="logo">
        <span class="logo-icon">🗳</span>
        <div class="logo-title">Heidi Pacella <span>for Mayor</span></div>
        <div class="logo-sub">Homer Glen, IL</div>
      </div>

      <div id="error" class="error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="campaign@cushingtrans.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');

      if (!email || !password) {
        errorEl.textContent = 'Email and password required';
        errorEl.classList.add('show');
        return;
      }

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
        });

        if (res.ok) {
          window.location.href = '/dashboard';
        } else {
          const text = await res.text();
          errorEl.textContent = text || 'Login failed';
          errorEl.classList.add('show');
        }
      } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.classList.add('show');
      }
    });

    // Theme toggle
    function toggleTheme() {
      const isDark = document.body.classList.contains('light-theme');
      if (isDark) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark');
        document.getElementById('themeToggleBtn').textContent = '🌙 Dark';
      } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
        document.getElementById('themeToggleBtn').textContent = '☀️ Light';
      }
    }

    // Load saved theme on page load
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        document.getElementById('themeToggleBtn').textContent = '☀️ Light';
      } else {
        document.getElementById('themeToggleBtn').textContent = '🌙 Dark';
      }
    }

    initTheme();
  </script>
</body>
</html>

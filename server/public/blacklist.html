<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blacklist — Heidi Pacella</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B1929;
      --navy-mid: #122338;
      --navy-light: #1A3550;
      --gold: #F5A623;
      --text: #EEF2F7;
      --text-muted: #8BA3BE;
      --red: #E03434;
      --surface: #122338;
    }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      padding: 30px;
    }
    .container { max-width: 1000px; margin: 0 auto; }
    .header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(245, 166, 35, 0.2);
    }
    h1 { font-size: 28px; color: var(--gold); font-weight: 700; }
    .btn {
      padding: 10px 16px;
      border: 1px solid var(--gold);
      background: rgba(245, 166, 35, 0.1);
      color: var(--gold);
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background: rgba(245, 166, 35, 0.2); }
    .btn-add { background: var(--gold); color: var(--navy); }
    .btn-add:hover { background: #FBBF48; }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1px solid rgba(245, 166, 35, 0.3);
      background: var(--navy-mid);
      color: var(--text);
      border-radius: 6px;
    }
    .table-container {
      background: var(--navy-mid);
      border-radius: 8px;
      border: 1px solid rgba(245, 166, 35, 0.1);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      background: var(--navy-light);
      padding: 16px;
      text-align: left;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 11px;
      border-bottom: 1px solid rgba(245, 166, 35, 0.1);
    }
    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(245, 166, 35, 0.05);
    }
    tr:hover { background: rgba(245, 166, 35, 0.03); }
    .delete-btn {
      padding: 4px 8px;
      background: rgba(224, 52, 52, 0.1);
      color: var(--red);
      border: 1px solid var(--red);
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .delete-btn:hover { background: rgba(224, 52, 52, 0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚫 Blacklist</h1>
      <p style="color: var(--text-muted); margin-top: 4px;">Manage blocked email addresses</p>
    </div>

    <div class="controls">
      <input type="text" class="search-box" id="search" placeholder="Search blacklist..." onkeyup="filterBlacklist()">
      <button class="btn btn-add" onclick="addToBlacklist()">➕ Add Email</button>
      <button class="btn" onclick="history.back()">← Back</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th style="width: 70%;">📧 Email Address</th>
            <th>📝 Reason</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody id="blacklist-body">
          <!-- Populated by JavaScript -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const blacklist = [
      { email: 'spam@example.com', reason: 'Spam complaints' },
      { email: 'bounced@oldmail.com', reason: 'Permanently bounced' },
      { email: 'unsubscribed@test.org', reason: 'Repeatedly unsubscribed' },
    ];

    function renderBlacklist() {
      const tbody = document.getElementById('blacklist-body');
      tbody.innerHTML = blacklist.map((item, idx) => `
        <tr>
          <td>${item.email}</td>
          <td style="color: var(--text-muted); font-size: 12px;">${item.reason}</td>
          <td>
            <button class="delete-btn" onclick="removeFromBlacklist(${idx})">🗑️ Remove</button>
          </td>
        </tr>
      `).join('');
    }

    function filterBlacklist() {
      const query = document.getElementById('search').value.toLowerCase();
      const tbody = document.getElementById('blacklist-body');
      tbody.innerHTML = blacklist
        .filter(item => item.email.includes(query))
        .map((item, idx) => `
          <tr>
            <td>${item.email}</td>
            <td style="color: var(--text-muted); font-size: 12px;">${item.reason}</td>
            <td>
              <button class="delete-btn" onclick="removeFromBlacklist(${blacklist.indexOf(item)})">🗑️ Remove</button>
            </td>
          </tr>
        `).join('');
    }

    function addToBlacklist() {
      const email = prompt('Enter email to blacklist:');
      if (email && email.includes('@')) {
        blacklist.push({ email, reason: 'Manual entry' });
        renderBlacklist();
        alert('✅ Email added to blacklist');
      }
    }

    function removeFromBlacklist(idx) {
      if (confirm(`Remove ${blacklist[idx].email}?`)) {
        blacklist.splice(idx, 1);
        renderBlacklist();
      }
    }

    renderBlacklist();
  </script>
</body>
</html>

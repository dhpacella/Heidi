<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMS History</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #001f3f;
      --gold: #d4af37;
      --light-bg: #f5f5f5;
      --dark-bg: #1a1a1a;
      --text-light: #333;
      --text-dark: #e0e0e0;
      --border-light: #ddd;
      --border-dark: #444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Barlow', sans-serif;
      transition: background-color 0.3s, color 0.3s;
    }

    body.light-mode {
      background-color: var(--light-bg);
      color: var(--text-light);
    }

    body.dark-mode {
      background-color: var(--dark-bg);
      color: var(--text-dark);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background-color: var(--navy);
      color: var(--gold);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    header h1 {
      font-size: 28px;
      text-align: center;
      flex: 1;
      min-width: 200px;
      letter-spacing: 2px;
    }

    .header-left, .header-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .btn-secondary {
      background-color: var(--navy);
      color: var(--gold);
      border: 2px solid var(--gold);
    }

    .btn-secondary:hover {
      background-color: var(--gold);
      color: var(--navy);
    }

    .btn-dark-toggle {
      background-color: transparent;
      color: var(--gold);
      border: 2px solid var(--gold);
      cursor: pointer;
      padding: 8px 12px;
    }

    .btn-dark-toggle:hover {
      background-color: var(--gold);
      color: var(--navy);
    }

    .btn-logout {
      background-color: #dc3545;
      color: white;
      border: none;
    }

    .btn-logout:hover {
      background-color: #c82333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background-color: var(--navy);
      color: var(--gold);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    body.dark-mode table {
      background-color: #0a0a0a;
      border: 1px solid var(--border-dark);
    }

    th {
      background-color: var(--navy);
      color: var(--gold);
      padding: 15px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--gold);
    }

    body.dark-mode th {
      background-color: #0a0a0a;
      border-bottom-color: var(--gold);
    }

    td {
      padding: 12px 15px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    }

    tr:hover {
      background-color: rgba(212, 175, 55, 0.1);
      cursor: pointer;
    }

    .message-preview {
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recipient-count {
      font-weight: 600;
    }

    .cost {
      color: #ffeb3b;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    body.dark-mode .empty-state {
      color: var(--text-dark);
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
    }

    .error {
      background-color: #f8d7da;
      color: #721c24;
      padding: 15px;
      border-radius: 6px;
      margin: 20px 0;
      border: 1px solid #f5c6cb;
    }

    body.dark-mode .error {
      background-color: #3a2626;
      color: #f8b4b8;
      border-color: #5a3636;
    }

    .pagination {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .pagination button {
      padding: 8px 12px;
      border: 1px solid var(--gold);
      background-color: var(--navy);
      color: var(--gold);
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }

    .pagination button:hover {
      background-color: var(--gold);
      color: var(--navy);
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 10px;
      }

      header h1 {
        font-size: 20px;
      }

      table {
        font-size: 14px;
      }

      th, td {
        padding: 10px;
      }

      .message-preview {
        max-width: 150px;
      }

      .header-left, .header-right {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body class="light-mode">
  <div class="container">
    <header>
      <div class="header-left">
        <button class="btn btn-secondary" onclick="goToDashboard()">← Dashboard</button>
        <button class="btn btn-secondary" onclick="goToCompose()">📝 New Blast</button>
      </div>
      <h1>SMS HISTORY</h1>
      <div class="header-right">
        <button class="btn btn-dark-toggle" onclick="toggleTheme()">🌙 Dark</button>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
      </div>
    </header>

    <div id="content">
      <div class="loading">Loading SMS history...</div>
    </div>
  </div>

  <script>
    // Theme toggle
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark-mode');
      document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeButton();
    }

    function updateThemeButton() {
      const btn = document.querySelector('.btn-dark-toggle');
      const isDark = document.body.classList.contains('dark-mode');
      btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
    }

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.body.classList.remove('light-mode', 'dark-mode');
      document.body.classList.add(saved === 'dark' ? 'dark-mode' : 'light-mode');
      updateThemeButton();
    }

    // Navigation
    function goToDashboard() {
      window.location.href = '/dashboard';
    }

    function goToCompose() {
      window.location.href = '/sms-compose';
    }

    function logout() {
      fetch('/logout', { method: 'POST' })
        .then(() => window.location.href = '/login')
        .catch(err => console.error('Logout error:', err));
    }

    // Load SMS blasts
    async function loadBlasts(page = 1) {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Loading SMS history...</div>';

      try {
        const response = await fetch(`/api/sms/blasts?page=${page}`);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (!data.blasts || data.blasts.length === 0) {
          content.innerHTML = '<div class="empty-state"><p>No SMS blasts sent yet. <a href="/sms-compose" style="color: inherit; text-decoration: underline;">Create one now</a></p></div>';
          return;
        }

        // Build table
        let html = `
          <table>
            <thead>
              <tr>
                <th>Date Sent</th>
                <th>Message</th>
                <th>Recipients</th>
                <th>SMS Parts</th>
                <th>Cost</th>
                <th>Sender</th>
              </tr>
            </thead>
            <tbody>
        `;

        data.blasts.forEach(blast => {
          const date = new Date(blast.created_at).toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
          const preview = (blast.message || '').substring(0, 60) + (blast.message.length > 60 ? '...' : '');
          const cost = `$${parseFloat(blast.total_cost || 0).toFixed(2)}`;

          html += `
            <tr>
              <td>${date}</td>
              <td class="message-preview" title="${blast.message}">${preview}</td>
              <td class="recipient-count">${blast.recipient_count}</td>
              <td>${blast.parts_per_message}</td>
              <td class="cost">${cost}</td>
              <td>${blast.sender_name || 'Unknown'}</td>
            </tr>
          `;
        });

        html += `
            </tbody>
          </table>
        `;

        // Pagination
        if (data.pages > 1) {
          html += '<div class="pagination">';
          if (page > 1) {
            html += `<button onclick="loadBlasts(${page - 1})">← Previous</button>`;
          }
          html += `<span style="padding: 8px 12px;">Page ${page} of ${data.pages}</span>`;
          if (page < data.pages) {
            html += `<button onclick="loadBlasts(${page + 1})">Next →</button>`;
          }
          html += '</div>';
        }

        content.innerHTML = html;
      } catch (err) {
        console.error('Error loading blasts:', err);
        content.innerHTML = `<div class="error">Error loading SMS history: ${err.message}</div>`;
      }
    }

    // Init on page load
    initTheme();
    loadBlasts();
  </script>
</body>
</html>

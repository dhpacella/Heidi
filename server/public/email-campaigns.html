<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Deliverability Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --navy: #0B1929;
      --navy-mid: #122338;
      --navy-light: #1A3550;
      --gold: #F5A623;
      --gold-light: #FBBF48;
      --green: #1DB87A;
      --red: #E03434;
      --orange: #FF9500;
      --text: #EEF2F7;
      --text-muted: #8BA3BE;
      --surface: #122338;
      --border: rgba(245, 166, 35, 0.2);
    }

    body.light-mode {
      --navy: #F5F5F5;
      --navy-mid: #FFFFFF;
      --navy-light: #F0F0F0;
      --text: #1A1A1A;
      --text-muted: #666666;
      --surface: #FFFFFF;
      --border: rgba(245, 166, 35, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: var(--navy-mid);
      border-bottom: 3px solid var(--gold);
      padding: 20px 32px;
      margin: -20px -20px 30px -20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gold);
      flex: 1;
      min-width: 250px;
    }

    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 18px;
      border: 1px solid var(--gold);
      border-radius: 6px;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--gold);
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: rgba(245, 166, 35, 0.1);
    }

    .btn-dark-toggle {
      background: rgba(245, 166, 35, 0.1);
    }

    .btn-logout {
      background: rgba(255, 77, 109, 0.15);
      color: #FF4D6D;
      border-color: #FF4D6D;
    }

    .btn-logout:hover {
      background: rgba(255, 77, 109, 0.25);
    }

    /* Stat Cards Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      margin: 8px 0;
    }

    .stat-percent {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      margin: 8px 0;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Charts Container */
    .charts-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .chart-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .chart-wrapper {
      position: relative;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      max-height: 300px;
    }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    @media (max-width: 1024px) {
      .charts-container {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        text-align: center;
      }

      header h1 {
        flex: none;
        min-width: auto;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .charts-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 Email Deliverability</h1>
      <div class="header-controls">
        <a href="/email-metrics" class="btn">📈 View Details</a>
        <a href="/email-compose" class="btn">📧 New Campaign</a>
        <button class="btn btn-dark-toggle" onclick="toggleTheme()">🌙 Dark</button>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
      </div>
    </header>

    <div id="content" style="display: none;">
      <!-- Stat Cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Campaigns</div>
          <div class="stat-value" id="totalCampaigns">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Sent</div>
          <div class="stat-value" id="totalSent">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Delivery Rate</div>
          <div class="stat-percent" id="deliveryRate">0%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Open Rate</div>
          <div class="stat-percent" id="openRate">0%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Click Rate</div>
          <div class="stat-percent" id="clickRate">0%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Bounce Rate</div>
          <div class="stat-percent" id="bounceRate">0%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Complaint Rate</div>
          <div class="stat-percent" id="complaintRate">0%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Unsubscribe Rate</div>
          <div class="stat-percent" id="unsubscribeRate">0%</div>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-container">
        <div class="chart-card">
          <div class="chart-title">Delivery Status Breakdown</div>
          <div class="chart-wrapper">
            <canvas id="deliveryChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-title">Engagement Metrics</div>
          <div class="chart-wrapper">
            <canvas id="engagementChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div id="loading" class="loading">
      <p>Loading deliverability data...</p>
    </div>
  </div>

  <script>
    let deliveryChartInstance = null;
    let engagementChartInstance = null;

    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      const isDark = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      document.querySelector('.btn-dark-toggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
    }

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark';
      if (saved === 'light') document.body.classList.add('light-mode');
      document.querySelector('.btn-dark-toggle').textContent = saved === 'light' ? '☀️ Light' : '🌙 Dark';
    }

    function logout() {
      fetch('/logout', { method: 'POST' }).then(() => window.location.href = '/login');
    }

    async function loadDashboard() {
      try {
        // Fetch blasts data and aggregate metrics
        const res = await fetch('/api/email/blasts');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const { blasts } = await res.json();

        // Aggregate stats from blasts
        let stats = {
          totalCampaigns: 0,
          totalSent: 0,
          totalDelivered: 0,
          totalOpened: 0,
          totalClicked: 0,
          totalBounced: 0,
          totalComplained: 0,
          totalUnsubscribed: 0
        };

        if (blasts && blasts.length > 0) {
          stats.totalCampaigns = blasts.length;
          blasts.forEach(b => {
            stats.totalSent += parseInt(b.recipient_count) || 0;
            stats.totalDelivered += parseInt(b.delivered_count) || 0;
            stats.totalOpened += parseInt(b.opened_count) || 0;
            stats.totalClicked += parseInt(b.clicked_count) || 0;
            stats.totalBounced += parseInt(b.bounced_count) || 0;
            stats.totalComplained += parseInt(b.complained_count) || 0;
            stats.totalUnsubscribed += parseInt(b.unsubscribed_count) || 0;
          });
        }

        // Calculate rates
        const totalSent = stats.totalSent;
        stats.deliveryRate = totalSent ? ((stats.totalDelivered / totalSent) * 100).toFixed(1) : 0;
        stats.openRate = totalSent ? ((stats.totalOpened / totalSent) * 100).toFixed(1) : 0;
        stats.clickRate = totalSent ? ((stats.totalClicked / totalSent) * 100).toFixed(1) : 0;
        stats.bounceRate = totalSent ? ((stats.totalBounced / totalSent) * 100).toFixed(1) : 0;
        stats.complaintRate = totalSent ? ((stats.totalComplained / totalSent) * 100).toFixed(1) : 0;
        stats.unsubscribeRate = totalSent ? ((stats.totalUnsubscribed / totalSent) * 100).toFixed(1) : 0;

        // Update stat cards
        document.getElementById('totalCampaigns').textContent = stats.totalCampaigns.toLocaleString();
        document.getElementById('totalSent').textContent = stats.totalSent.toLocaleString();
        document.getElementById('deliveryRate').textContent = stats.deliveryRate + '%';
        document.getElementById('openRate').textContent = stats.openRate + '%';
        document.getElementById('clickRate').textContent = stats.clickRate + '%';
        document.getElementById('bounceRate').textContent = stats.bounceRate + '%';
        document.getElementById('complaintRate').textContent = stats.complaintRate + '%';
        document.getElementById('unsubscribeRate').textContent = stats.unsubscribeRate + '%';

        // Delivery Status Donut Chart
        const deliveryCtx = document.getElementById('deliveryChart').getContext('2d');
        if (deliveryChartInstance) deliveryChartInstance.destroy();
        deliveryChartInstance = new Chart(deliveryCtx, {
          type: 'doughnut',
          data: {
            labels: ['Delivered', 'Bounced', 'Complained', 'Unsubscribed'],
            datasets: [{
              data: [
                stats.totalDelivered,
                stats.totalBounced,
                stats.totalComplained,
                stats.totalUnsubscribed
              ],
              backgroundColor: ['#1DB87A', '#E03434', '#FF9500', '#8BA3BE'],
              borderColor: 'var(--surface)',
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: { color: 'var(--text)', font: { size: 12 }, padding: 15 }
              }
            }
          }
        });

        // Engagement Metrics Bar Chart
        const engagementCtx = document.getElementById('engagementChart').getContext('2d');
        if (engagementChartInstance) engagementChartInstance.destroy();
        engagementChartInstance = new Chart(engagementCtx, {
          type: 'bar',
          data: {
            labels: ['Delivered', 'Opened', 'Clicked'],
            datasets: [{
              label: 'Count',
              data: [stats.totalDelivered, stats.totalOpened, stats.totalClicked],
              backgroundColor: ['#1DB87A', '#F5A623', '#5DE0B0'],
              borderRadius: 4,
              borderSkipped: false
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                labels: { color: 'var(--text)', font: { size: 12 } }
              }
            },
            scales: {
              x: {
                grid: { color: 'rgba(245, 166, 35, 0.1)' },
                ticks: { color: 'var(--text-muted)', font: { size: 11 } }
              },
              y: {
                ticks: { color: 'var(--text)', font: { size: 11 } }
              }
            }
          }
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (err) {
        console.error(err);
        document.getElementById('loading').innerHTML = `<p style="color: #E03434;">Error loading data: ${err.message}</p>`;
      }
    }

    initTheme();
    loadDashboard();
  </script>
</body>
</html>

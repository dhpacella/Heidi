<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - Heidi Voter Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap">
  <style>
    :root {
      --navy: #0B1929;
      --navy-mid: #122338;
      --navy-light: #1A3550;
      --gold: #F5A623;
      --gold-light: #FBBF48;
      --text: #EEF2F7;
      --text-muted: #8BA3BE;
      --border: #243D56;
      --surface: #122338;
      --surface-2: #1A3550;
      --radius: 10px;
    }

    body.light-theme {
      --navy: #F5F5F5;
      --navy-mid: #FFFFFF;
      --navy-light: #F0F0F0;
      --text: #1A1A1A;
      --text-muted: #666666;
      --border: #DDDDDD;
      --surface: #FFFFFF;
      --surface-2: #F9F9F9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    header {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0B1929 0%, #122338 40%, #1A3550 100%);
      color: white;
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    header::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(245, 166, 35, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), #F5A62300);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin: 0;
    }

    header p {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      margin: 4px 0 0 0;
    }

    main {
      padding: 30px;
    }

    .section {
      margin-bottom: 40px;
    }

    .section h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      transition: all 0.15s;
    }

    body.light-theme input,
    body.light-theme select {
      background: white;
      color: var(--text);
    }

    input::placeholder, select::placeholder {
      color: var(--text-muted);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Barlow', sans-serif;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--navy);
    }

    .btn-primary:hover {
      background: var(--gold-light);
      box-shadow: 0 4px 16px rgba(245, 166, 35, 0.35);
    }

    .btn-danger {
      background: #dc3545;
      color: white;
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border: 1px solid;
    }

    .alert-success {
      background: rgba(29, 184, 122, 0.15);
      color: #1DB87A;
      border-color: rgba(29, 184, 122, 0.3);
    }

    .alert-error {
      background: rgba(224, 52, 52, 0.15);
      color: #FF8080;
      border-color: rgba(224, 52, 52, 0.3);
    }

    .alert-info {
      background: rgba(102, 126, 234, 0.15);
      color: #667eea;
      border-color: rgba(102, 126, 234, 0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table th {
      background: var(--surface-2);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    table tr:hover {
      background: var(--surface-2);
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
    }

    .badge-admin {
      background: var(--gold);
      color: var(--navy);
    }

    .badge-staff {
      background: rgba(29, 184, 122, 0.2);
      color: #1DB87A;
    }

    .badge-campaign_manager {
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
    }

    .text-muted {
      color: var(--text-muted);
      font-size: 13px;
    }

    .no-users {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .logout-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      padding: 8px 15px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.15s;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: var(--gold);
    }

    .loading.active {
      display: block;
    }

    #roleDescription {
      background: var(--surface-2) !important;
      border: 1px solid var(--border) !important;
      color: var(--text-muted) !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <button onclick="toggleTheme()" style="position:absolute;top:20px;right:100px;font-size:12px;padding:6px 12px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:white;cursor:pointer;font-weight:600;transition:all .15s;font-family:'Barlow',sans-serif" onmouseover="this.style.background='rgba(255,255,255,.3)';this.style.borderColor='rgba(255,255,255,.3)'" onmouseout="this.style.background='rgba(255,255,255,.2)';this.style.borderColor='rgba(255,255,255,.2)'" id="themeToggleBtn">🌙 Dark</button>
      <a href="/logout" class="logout-btn">Logout</a>
      <div class="header-inner">
        <div>
          <h1>User Management</h1>
          <p>Create and manage dashboard users</p>
        </div>
        <a href="/dashboard" style="position:absolute;bottom:20px;left:24px;background:rgba(255,255,255,.2);color:white;padding:8px 16px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,.2);transition:all .15s;font-family:'Barlow',sans-serif" onmouseover="this.style.background='rgba(255,255,255,.3)';this.style.borderColor='rgba(255,255,255,.3)'" onmouseout="this.style.background='rgba(255,255,255,.2)';this.style.borderColor='rgba(255,255,255,.2)'">← Back to Dashboard</a>
      </div>
    </header>

    <main>
      <!-- Create User Section -->
      <div class="section">
        <h2>Create New User</h2>
        <div id="createAlert"></div>

        <form id="createUserForm">
          <div class="form-row">
            <div class="form-group">
              <label for="email">Email Address *</label>
              <input type="email" id="email" name="email" required placeholder="user@example.com">
            </div>
            <div class="form-group">
              <label for="name">Full Name *</label>
              <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="password">Password *</label>
              <input type="password" id="password" name="password" required placeholder="Minimum 8 characters">
            </div>
            <div class="form-group">
              <label for="role">User Role *</label>
              <select id="role" name="role" onchange="updateRoleDescription()">
                <option value="staff">Staff Member - View voters, log activities</option>
                <option value="campaign_manager">Campaign Manager - Create campaigns, assign staff, walk lists</option>
                <option value="admin">Administrator - Full system access, user management</option>
              </select>
              <div id="roleDescription" style="font-size: 12px; color: #666; margin-top: 8px; padding: 10px; background: #f5f5f5; border-radius: 4px; display: none;"></div>
            </div>
          </div>

          <button type="submit" class="btn-primary">Create User</button>
        </form>
      </div>

      <!-- Users List Section -->
      <div class="section">
        <h2>Existing Users</h2>
        <div id="usersAlert"></div>

        <div id="loadingUsers" class="loading active">
          <p>Loading users...</p>
        </div>

        <div id="usersContainer"></div>
      </div>
    </main>
  </div>

  <script>
    const API_URL = '/api/admin';

    // Check if user is logged in and is admin
    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/me', {
          credentials: 'include'
        });

        if (!res.ok) {
          window.location.href = '/login';
          return;
        }

        const data = await res.json();
        if (data.user.role !== 'admin') {
          showAlert('usersAlert', 'You do not have permission to access this page.', 'error');
          setTimeout(() => window.location.href = '/dashboard', 2000);
        }
      } catch (err) {
        console.error('Auth check failed:', err);
        window.location.href = '/login';
      }
    }

    function showAlert(elementId, message, type = 'success') {
      const alertEl = document.getElementById(elementId);
      alertEl.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
    }

    function clearAlert(elementId) {
      document.getElementById(elementId).innerHTML = '';
    }

    // Create user
    document.getElementById('createUserForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert('createAlert');

      const formData = {
        email: document.getElementById('email').value,
        name: document.getElementById('name').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };

      try {
        const res = await fetch(`${API_URL}/create-user`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(formData)
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert('createAlert', data.error || 'Failed to create user', 'error');
          return;
        }

        showAlert('createAlert', `User ${data.user.email} created successfully!`, 'success');
        document.getElementById('createUserForm').reset();
        loadUsers();
      } catch (err) {
        console.error('Create user error:', err);
        showAlert('createAlert', 'An error occurred. Please try again.', 'error');
      }
    });

    // Load users
    async function loadUsers() {
      try {
        const res = await fetch(`${API_URL}/users`, {
          credentials: 'include'
        });

        if (!res.ok) {
          showAlert('usersAlert', 'Failed to load users', 'error');
          document.getElementById('loadingUsers').classList.remove('active');
          return;
        }

        const data = await res.json();
        displayUsers(data.users);
        document.getElementById('loadingUsers').classList.remove('active');
      } catch (err) {
        console.error('Load users error:', err);
        showAlert('usersAlert', 'Failed to load users', 'error');
        document.getElementById('loadingUsers').classList.remove('active');
      }
    }

    function displayUsers(users) {
      const container = document.getElementById('usersContainer');

      if (users.length === 0) {
        container.innerHTML = '<div class="no-users"><p>No users created yet.</p></div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Name</th>
              <th>Role</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
      `;

      users.forEach(user => {
        const createdDate = new Date(user.created_at).toLocaleDateString();
        let roleClass = 'badge-staff';
        if (user.role === 'admin') roleClass = 'badge-admin';
        else if (user.role === 'campaign_manager') roleClass = 'badge-campaign_manager';

        const displayRole = user.role === 'campaign_manager' ? 'Campaign Manager' : user.role.charAt(0).toUpperCase() + user.role.slice(1);

        html += `
          <tr>
            <td>${escapeHtml(user.email)}</td>
            <td>${escapeHtml(user.name)}</td>
            <td><span class="badge ${roleClass}">${displayRole}</span></td>
            <td><span class="text-muted">${createdDate}</span></td>
            <td>
              <button class="btn-danger" onclick="deleteUser(${user.id}, '${escapeHtml(user.email)}')">Delete</button>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      container.innerHTML = html;
    }

    function deleteUser(userId, email) {
      if (!confirm(`Are you sure you want to delete ${email}?`)) {
        return;
      }

      fetch(`${API_URL}/users/${userId}`, {
        method: 'DELETE',
        credentials: 'include'
      })
        .then(res => res.json())
        .then(data => {
          if (!data.success) {
            showAlert('usersAlert', data.error || 'Failed to delete user', 'error');
            return;
          }
          showAlert('usersAlert', `User ${email} deleted successfully`, 'success');
          loadUsers();
        })
        .catch(err => {
          console.error('Delete user error:', err);
          showAlert('usersAlert', 'Failed to delete user', 'error');
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateRoleDescription() {
      const role = document.getElementById('role').value;
      const descDiv = document.getElementById('roleDescription');
      const descriptions = {
        staff: 'View and search voters, log activities, referral tracking. No access to campaign or user management.',
        campaign_manager: 'Create and manage campaigns, assign staff members, generate walk lists by precinct, export voter data. Access limited to assigned campaigns.',
        admin: 'Full system access including user management, system settings, all campaigns, and all administrative functions.'
      };

      descDiv.textContent = descriptions[role] || '';
      descDiv.style.display = descriptions[role] ? 'block' : 'none';
    }

    // Initialize
    checkAuth();
    loadUsers();

    // Theme toggle
    function toggleTheme() {
      const isDark = document.body.classList.contains('light-theme');
      if (isDark) {
        document.body.classList.remove('light-theme');
        localStorage.setItem('theme', 'dark');
        document.getElementById('themeToggleBtn').textContent = '🌙 Dark';
      } else {
        document.body.classList.add('light-theme');
        localStorage.setItem('theme', 'light');
        document.getElementById('themeToggleBtn').textContent = '☀️ Light';
      }
    }

    // Load saved theme on page load
    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      if (savedTheme === 'light') {
        document.body.classList.add('light-theme');
        document.getElementById('themeToggleBtn').textContent = '☀️ Light';
      } else {
        document.getElementById('themeToggleBtn').textContent = '🌙 Dark';
      }
    }

    initTheme();
  </script>
</body>
</html>

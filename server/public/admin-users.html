<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - Heidi Voter Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    header p {
      font-size: 14px;
      opacity: 0.9;
    }

    main {
      padding: 30px;
    }

    .section {
      margin-bottom: 40px;
    }

    .section h2 {
      font-size: 20px;
      color: #333;
      margin-bottom: 20px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-danger {
      background: #dc3545;
      color: white;
      padding: 6px 12px;
      font-size: 12px;
    }

    .btn-danger:hover {
      background: #c82333;
    }

    .alert {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .alert-info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table th {
      background: #f8f9fa;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #555;
      border-bottom: 2px solid #ddd;
      font-size: 13px;
    }

    table td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }

    table tr:hover {
      background: #f8f9fa;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-admin {
      background: #ffc107;
      color: #333;
    }

    .badge-staff {
      background: #28a745;
      color: white;
    }

    .text-muted {
      color: #6c757d;
      font-size: 13px;
    }

    .no-users {
      text-align: center;
      padding: 40px 20px;
      color: #6c757d;
    }

    .logout-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      padding: 8px 15px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #667eea;
    }

    .loading.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/logout" class="logout-btn">Logout</a>
      <h1>User Management</h1>
      <p>Create and manage dashboard users</p>
    </header>

    <main>
      <!-- Create User Section -->
      <div class="section">
        <h2>Create New User</h2>
        <div id="createAlert"></div>

        <form id="createUserForm">
          <div class="form-row">
            <div class="form-group">
              <label for="email">Email Address *</label>
              <input type="email" id="email" name="email" required placeholder="user@example.com">
            </div>
            <div class="form-group">
              <label for="name">Full Name *</label>
              <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="password">Password *</label>
              <input type="password" id="password" name="password" required placeholder="Minimum 8 characters">
            </div>
            <div class="form-group">
              <label for="role">User Role *</label>
              <select id="role" name="role" onchange="updateRoleDescription()">
                <option value="staff">Staff Member - View voters, log activities</option>
                <option value="campaign_manager">Campaign Manager - Create campaigns, assign staff, walk lists</option>
                <option value="admin">Administrator - Full system access, user management</option>
              </select>
              <div id="roleDescription" style="font-size: 12px; color: #666; margin-top: 8px; padding: 10px; background: #f5f5f5; border-radius: 4px; display: none;"></div>
            </div>
          </div>

          <button type="submit" class="btn-primary">Create User</button>
        </form>
      </div>

      <!-- Users List Section -->
      <div class="section">
        <h2>Existing Users</h2>
        <div id="usersAlert"></div>

        <div id="loadingUsers" class="loading active">
          <p>Loading users...</p>
        </div>

        <div id="usersContainer"></div>
      </div>
    </main>
  </div>

  <script>
    const API_URL = '/api/admin';

    // Check if user is logged in and is admin
    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/me', {
          credentials: 'include'
        });

        if (!res.ok) {
          window.location.href = '/login';
          return;
        }

        const data = await res.json();
        if (data.user.role !== 'admin') {
          showAlert('usersAlert', 'You do not have permission to access this page.', 'error');
          setTimeout(() => window.location.href = '/dashboard', 2000);
        }
      } catch (err) {
        console.error('Auth check failed:', err);
        window.location.href = '/login';
      }
    }

    function showAlert(elementId, message, type = 'success') {
      const alertEl = document.getElementById(elementId);
      alertEl.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
    }

    function clearAlert(elementId) {
      document.getElementById(elementId).innerHTML = '';
    }

    // Create user
    document.getElementById('createUserForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert('createAlert');

      const formData = {
        email: document.getElementById('email').value,
        name: document.getElementById('name').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };

      try {
        const res = await fetch(`${API_URL}/create-user`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(formData)
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert('createAlert', data.error || 'Failed to create user', 'error');
          return;
        }

        showAlert('createAlert', `User ${data.user.email} created successfully!`, 'success');
        document.getElementById('createUserForm').reset();
        loadUsers();
      } catch (err) {
        console.error('Create user error:', err);
        showAlert('createAlert', 'An error occurred. Please try again.', 'error');
      }
    });

    // Load users
    async function loadUsers() {
      try {
        const res = await fetch(`${API_URL}/users`, {
          credentials: 'include'
        });

        if (!res.ok) {
          showAlert('usersAlert', 'Failed to load users', 'error');
          document.getElementById('loadingUsers').classList.remove('active');
          return;
        }

        const data = await res.json();
        displayUsers(data.users);
        document.getElementById('loadingUsers').classList.remove('active');
      } catch (err) {
        console.error('Load users error:', err);
        showAlert('usersAlert', 'Failed to load users', 'error');
        document.getElementById('loadingUsers').classList.remove('active');
      }
    }

    function displayUsers(users) {
      const container = document.getElementById('usersContainer');

      if (users.length === 0) {
        container.innerHTML = '<div class="no-users"><p>No users created yet.</p></div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Email</th>
              <th>Name</th>
              <th>Role</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
      `;

      users.forEach(user => {
        const createdDate = new Date(user.created_at).toLocaleDateString();
        const roleClass = user.role === 'admin' ? 'badge-admin' : 'badge-staff';

        html += `
          <tr>
            <td>${escapeHtml(user.email)}</td>
            <td>${escapeHtml(user.name)}</td>
            <td><span class="badge ${roleClass}">${user.role}</span></td>
            <td><span class="text-muted">${createdDate}</span></td>
            <td>
              <button class="btn-danger" onclick="deleteUser(${user.id}, '${escapeHtml(user.email)}')">Delete</button>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      container.innerHTML = html;
    }

    function deleteUser(userId, email) {
      if (!confirm(`Are you sure you want to delete ${email}?`)) {
        return;
      }

      fetch(`${API_URL}/users/${userId}`, {
        method: 'DELETE',
        credentials: 'include'
      })
        .then(res => res.json())
        .then(data => {
          if (!data.success) {
            showAlert('usersAlert', data.error || 'Failed to delete user', 'error');
            return;
          }
          showAlert('usersAlert', `User ${email} deleted successfully`, 'success');
          loadUsers();
        })
        .catch(err => {
          console.error('Delete user error:', err);
          showAlert('usersAlert', 'Failed to delete user', 'error');
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function updateRoleDescription() {
      const role = document.getElementById('role').value;
      const descDiv = document.getElementById('roleDescription');
      const descriptions = {
        staff: 'View and search voters, log activities, referral tracking. No access to campaign or user management.',
        campaign_manager: 'Create and manage campaigns, assign staff members, generate walk lists by precinct, export voter data. Access limited to assigned campaigns.',
        admin: 'Full system access including user management, system settings, all campaigns, and all administrative functions.'
      };

      descDiv.textContent = descriptions[role] || '';
      descDiv.style.display = descriptions[role] ? 'block' : 'none';
    }

    // Initialize
    checkAuth();
    loadUsers();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A/B Test Results</title>
  <style>
    :root {
      --bg: #0B1929;
      --surface-1: #131F2E;
      --surface-2: #1A2332;
      --border: #2a3a4a;
      --text: #E4E8F0;
      --text-muted: #9CA3AF;
      --gold: #F5A623;
      --success: #10B981;
      --error: #EF4444;
      --warning: #FBBF24;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.5;
    }

    header {
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 20px;
      font-weight: 700;
    }

    .header-nav {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.2s;
      cursor: pointer;
    }

    .nav-link:hover {
      color: var(--gold);
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .tests-container {
      display: grid;
      gap: 24px;
    }

    .test-card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .test-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .test-id {
      font-weight: 600;
      font-size: 14px;
      color: var(--gold);
    }

    .test-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .variants-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .variant-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }

    .variant-label {
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .variant-badge {
      display: inline-block;
      width: 24px;
      height: 24px;
      background: var(--surface-1);
      border: 2px solid var(--gold);
      border-radius: 4px;
      text-align: center;
      line-height: 20px;
      font-weight: 700;
      font-size: 12px;
      color: var(--gold);
    }

    .winner-badge {
      display: inline-block;
      background: var(--success);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      margin-left: auto;
    }

    .subject-line {
      font-size: 13px;
      margin-bottom: 12px;
      padding: 8px;
      background: var(--surface-1);
      border-left: 3px solid var(--gold);
      border-radius: 2px;
      font-style: italic;
      color: var(--text-muted);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .stat-item {
      background: var(--surface-1);
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
    }

    .stat-label {
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
    }

    .stat-percentage {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .btn {
      display: inline-block;
      padding: 10px 16px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn:hover {
      background: var(--surface-1);
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-primary {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
    }

    .btn-primary:hover {
      background: #E5961D;
      border-color: #E5961D;
      color: var(--bg);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .spinner {
      border: 3px solid var(--surface-2);
      border-top: 3px solid var(--gold);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .variants-grid {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        gap: 12px;
      }

      .header-title {
        width: 100%;
      }

      .header-nav {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">
      <a href="/dashboard" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 8px;">
        ← Dashboard
      </a>
      📊 A/B Test Results
    </div>
    <div class="header-nav">
      <a href="/email-compose" class="nav-link">📧 New Email</a>
      <a href="/email-history" class="nav-link">📬 Email History</a>
      <button class="nav-link" onclick="toggleTheme()" style="border: none; background: none; cursor: pointer;">🌙 Dark</button>
      <a href="/api/auth/logout" class="nav-link">Logout</a>
    </div>
  </header>

  <main>
    <div class="page-title">📊 A/B Test Results</div>

    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      Loading tests...
    </div>

    <div id="empty" class="empty-state" style="display: none;">
      <div class="empty-state-icon">📊</div>
      <p>No A/B tests yet. <a href="/email-compose" style="color: var(--gold); text-decoration: none;">Create one now →</a></p>
    </div>

    <div id="testsContainer" class="tests-container"></div>
  </main>

  <script>
    // Theme toggle
    function toggleTheme() {
      const isDark = localStorage.getItem('theme') === 'light';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      applyTheme();
    }

    function applyTheme() {
      const theme = localStorage.getItem('theme') || 'dark';
      if (theme === 'light') {
        document.documentElement.style.setProperty('--bg', '#F5F5F5');
        document.documentElement.style.setProperty('--surface-1', '#FFFFFF');
        document.documentElement.style.setProperty('--surface-2', '#F9F9F9');
        document.documentElement.style.setProperty('--border', '#E5E7EB');
        document.documentElement.style.setProperty('--text', '#1F2937');
        document.documentElement.style.setProperty('--text-muted', '#6B7280');
      }
    }

    applyTheme();

    async function loadAbTests() {
      const loadingEl = document.getElementById('loading');
      const emptyEl = document.getElementById('empty');
      const containerEl = document.getElementById('testsContainer');

      loadingEl.style.display = 'block';
      containerEl.innerHTML = '';

      try {
        const res = await fetch('/api/email/ab-tests');
        const data = await res.json();

        loadingEl.style.display = 'none';

        if (!data.tests || data.tests.length === 0) {
          emptyEl.style.display = 'block';
          return;
        }

        emptyEl.style.display = 'none';
        data.tests.forEach(test => renderTestCard(test));
      } catch (err) {
        loadingEl.style.display = 'none';
        emptyEl.innerHTML = `<div class="empty-state-icon">⚠️</div><p>Failed to load tests: ${err.message}</p>`;
        emptyEl.style.display = 'block';
      }
    }

    function renderTestCard(test) {
      const variantA = test.variantA;
      const variantB = test.variantB;

      if (!variantA || !variantB) return; // Skip incomplete tests

      const dateStr = new Date(test.created_at).toLocaleString();

      // Calculate rates
      const openRateA = variantA.recipient_count > 0 ? (variantA.opened_count / variantA.recipient_count * 100).toFixed(1) : 0;
      const clickRateA = variantA.recipient_count > 0 ? (variantA.clicked_count / variantA.recipient_count * 100).toFixed(1) : 0;
      const openRateB = variantB.recipient_count > 0 ? (variantB.opened_count / variantB.recipient_count * 100).toFixed(1) : 0;
      const clickRateB = variantB.recipient_count > 0 ? (variantB.clicked_count / variantB.recipient_count * 100).toFixed(1) : 0;

      // Determine winners
      const openWinner = openRateA > openRateB ? 'A' : (openRateB > openRateA ? 'B' : null);
      const clickWinner = clickRateA > clickRateB ? 'A' : (clickRateB > clickRateA ? 'B' : null);

      const html = `
        <div class="test-card">
          <div class="test-header">
            <div>
              <div class="test-id">Test #${test.testId}</div>
              <div class="test-date">${dateStr}</div>
            </div>
          </div>

          <div class="variants-grid">
            <div class="variant-box">
              <div class="variant-label">
                <div class="variant-badge">A</div>
                Variant A
                ${openWinner === 'A' ? '<span class="winner-badge">🏆 Open Winner</span>' : ''}
                ${clickWinner === 'A' ? '<span class="winner-badge">🏆 Click Winner</span>' : ''}
              </div>
              <div class="subject-line">"${variantA.subject}"</div>
              <div class="stats-grid">
                <div class="stat-item">
                  <div class="stat-label">Recipients</div>
                  <div class="stat-value">${variantA.recipient_count}</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">Opens</div>
                  <div class="stat-value">${variantA.opened_count}</div>
                  <div class="stat-percentage">${openRateA}%</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">Clicks</div>
                  <div class="stat-value">${variantA.clicked_count}</div>
                  <div class="stat-percentage">${clickRateA}%</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">Status</div>
                  <div class="stat-value" style="font-size: 12px;">${variantA.status === 'sent' ? '✅ Sent' : variantA.status}</div>
                </div>
              </div>
            </div>

            <div class="variant-box">
              <div class="variant-label">
                <div class="variant-badge">B</div>
                Variant B
                ${openWinner === 'B' ? '<span class="winner-badge">🏆 Open Winner</span>' : ''}
                ${clickWinner === 'B' ? '<span class="winner-badge">🏆 Click Winner</span>' : ''}
              </div>
              <div class="subject-line">"${variantB.subject}"</div>
              <div class="stats-grid">
                <div class="stat-item">
                  <div class="stat-label">Recipients</div>
                  <div class="stat-value">${variantB.recipient_count}</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">Opens</div>
                  <div class="stat-value">${variantB.opened_count}</div>
                  <div class="stat-percentage">${openRateB}%</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">Clicks</div>
                  <div class="stat-value">${variantB.clicked_count}</div>
                  <div class="stat-percentage">${clickRateB}%</div>
                </div>
                <div class="stat-item">
                  <div class="stat-label">Status</div>
                  <div class="stat-value" style="font-size: 12px;">${variantB.status === 'sent' ? '✅ Sent' : variantB.status}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('testsContainer').innerHTML += html;
    }

    // Load on page load
    loadAbTests();

    // Auto-refresh every 30 seconds
    setInterval(loadAbTests, 30000);
  </script>
</body>
</html>

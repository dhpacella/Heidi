<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Management - Heidi Voter Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --navy: #0B1929;
      --navy-mid: #122338;
      --navy-light: #1A3550;
      --gold: #F5A623;
      --gold-light: #FBBF48;
      --green: #1DB87A;
      --red: #E03434;
      --text: #EEF2F7;
      --text-muted: #8BA3BE;
      --border: #243D56;
      --surface: #122338;
      --surface-2: #1A3550;
    }

    body.light-theme {
      --navy: #F5F5F5;
      --navy-mid: #FFFFFF;
      --navy-light: #F0F0F0;
      --text: #1A1A1A;
      --text-muted: #666666;
      --border: #DDDDDD;
      --surface: #FFFFFF;
      --surface-2: #F9F9F9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .page-header {
      background: linear-gradient(135deg, #0B1929 0%, #122338 40%, #1A3550 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(245,166,35,.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), #F5A62300);
    }

    .header-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      z-index: 1;
      margin-bottom: 16px;
    }

    .header-nav h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--navy-light);
      color: var(--text);
    }

    .btn:hover {
      background: var(--gold);
      color: var(--navy);
      border-color: var(--gold);
    }

    .btn-primary {
      background: var(--gold);
      color: var(--navy);
      border-color: var(--gold);
    }

    .btn-primary:hover {
      background: var(--gold-light);
    }

    .btn-sm {
      padding: 8px 12px;
      font-size: 13px;
    }

    /* ── Main Layout ── */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    /* ── Left Panel: Volunteer List ── */
    .volunteer-list-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-group label {
      font-size: 13px;
      color: var(--text-muted);
      align-self: center;
    }

    .filter-group select {
      flex: 1;
      padding: 8px 12px;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
    }

    .volunteer-item {
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .volunteer-item:hover {
      background: var(--surface-2);
      border-color: var(--gold);
    }

    .volunteer-item.selected {
      background: var(--surface-2);
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.2);
    }

    .volunteer-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .volunteer-name {
      font-weight: 600;
      font-size: 14px;
    }

    .volunteer-badge {
      background: var(--green);
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .volunteer-meta {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
    }

    .stat-item {
      display: flex;
      gap: 4px;
    }

    .stat-label {
      color: var(--text-muted);
    }

    .stat-value {
      color: var(--gold);
      font-weight: 600;
    }

    /* ── Right Panel: Details & Forms ── */
    .detail-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .detail-section.hidden {
      display: none;
    }

    .volunteer-detail {
      margin-bottom: 24px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .detail-header h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .info-label {
      color: var(--text-muted);
    }

    .info-value {
      font-weight: 500;
    }

    .assignments-list {
      background: var(--navy-light);
      border-radius: 8px;
      overflow: hidden;
      max-height: 300px;
      overflow-y: auto;
    }

    .assignment-item {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .assignment-item:last-child {
      border-bottom: none;
    }

    .assignment-name {
      flex: 1;
    }

    .assignment-status {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      margin-left: 8px;
    }

    .status-pending {
      background: rgba(245, 166, 35, 0.2);
      color: var(--gold);
    }

    .status-visited {
      background: rgba(29, 184, 122, 0.2);
      color: var(--green);
    }

    /* ── Add Volunteer Form ── */
    .form-section {
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .required::after {
      content: ' *';
      color: var(--red);
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    /* ── Modal ── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      padding: 0;
    }

    .modal-filters {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .progress-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .stat-card {
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    .stat-card-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
    }

    .stat-card-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .alert-success {
      background: rgba(29, 184, 122, 0.2);
      color: var(--green);
      border: 1px solid rgba(29, 184, 122, 0.3);
    }

    .alert-error {
      background: rgba(224, 52, 52, 0.2);
      color: var(--red);
      border: 1px solid rgba(224, 52, 52, 0.3);
    }

    @media (max-width: 1024px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      .volunteer-list-section,
      .detail-section {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="page-header">
      <div class="header-nav">
        <h1>📋 Volunteer Management</h1>
        <div class="header-controls">
          <button class="btn btn-primary" onclick="showAddVolunteerForm()">+ Add Volunteer</button>
          <button class="btn" onclick="toggleTheme()">🌙</button>
          <button class="btn" onclick="goToDashboard()">← Back</button>
        </div>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Left: Volunteer List -->
      <div class="volunteer-list-section">
        <div class="section-title">📍 Volunteers</div>

        <div class="filter-group">
          <label>Filter by Precinct:</label>
          <select id="precinctFilter" onchange="filterVolunteers()">
            <option value="">All Precincts</option>
          </select>
        </div>

        <div id="volunteerList"></div>
      </div>

      <!-- Right: Detail View / Add Form -->
      <div class="detail-section" id="addVolunteerSection">
        <div class="section-title">➕ Add New Volunteer</div>
        <form onsubmit="createVolunteer(event)" class="form-section">
          <div class="form-group">
            <label class="required">Name</label>
            <input type="text" id="volName" required placeholder="Full name">
          </div>
          <div class="form-group">
            <label class="required">Email</label>
            <input type="email" id="volEmail" required placeholder="Email address">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="volPhone" placeholder="Phone number">
          </div>
          <div class="form-group">
            <label>Precinct</label>
            <select id="volPrecinct">
              <option value="">Select a precinct</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Volunteer</button>
            <button type="button" class="btn" onclick="resetForm()">Cancel</button>
          </div>
          <div id="formMessage"></div>
        </form>
      </div>

      <div class="detail-section hidden" id="volunteerDetailSection">
        <div id="volunteerDetailContent"></div>
      </div>
    </div>
  </div>

  <!-- Modal: Assign Voters -->
  <div class="modal" id="assignModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>🎯 Assign Voters to <span id="assignVolName"></span></span>
        <button class="close-btn" onclick="closeAssignModal()">×</button>
      </div>

      <form onsubmit="assignVoters(event)" id="assignForm">
        <div class="modal-filters">
          <div class="form-group">
            <label>Precinct</label>
            <select id="filterPrecinct">
              <option value="">All Precincts</option>
            </select>
          </div>
          <div class="form-group">
            <label>Party Affiliation</label>
            <select id="filterParty">
              <option value="">All Parties</option>
              <option value="Democratic">Democratic</option>
              <option value="Republican">Republican</option>
              <option value="Independent">Independent</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Voted in Last N Years</label>
            <input type="number" id="filterVotedYears" min="1" max="30" placeholder="E.g., 2">
          </div>
          <div class="form-group">
            <label>Name (First or Last)</label>
            <input type="text" id="filterName" placeholder="Search by name">
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Assign Voters</button>
          <button type="button" class="btn" onclick="closeAssignModal()">Cancel</button>
        </div>

        <div id="assignMessage"></div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let selectedVolunteer = null;
    let volunteers = [];
    let precincts = [];

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      await loadPrecincts();
      await loadVolunteers();
      loadTheme();
    });

    // Theme toggle
    function toggleTheme() {
      document.body.classList.toggle('light-theme');
      localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }

    function loadTheme() {
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
      }
    }

    // Load precincts
    async function loadPrecincts() {
      try {
        const res = await fetch('/api/precincts', { credentials: 'include' });
        const data = await res.json();
        precincts = data.precincts || [];

        const selectPrecinct = document.getElementById('precinctFilter');
        const selectVolPrecinct = document.getElementById('volPrecinct');
        const selectFilterPrecinct = document.getElementById('filterPrecinct');

        precincts.forEach(p => {
          const opt1 = document.createElement('option');
          opt1.value = p.id;
          opt1.textContent = p.name;
          selectVolPrecinct.appendChild(opt1);

          const opt2 = document.createElement('option');
          opt2.value = p.id;
          opt2.textContent = p.name;
          selectPrecinct.appendChild(opt2);

          const opt3 = document.createElement('option');
          opt3.value = p.id;
          opt3.textContent = p.name;
          selectFilterPrecinct.appendChild(opt3);
        });
      } catch (err) {
        console.error('Error loading precincts:', err);
      }
    }

    // Load volunteers
    async function loadVolunteers() {
      try {
        const precinctId = document.getElementById('precinctFilter').value;
        const url = precinctId
          ? `/api/volunteers?precinct_id=${precinctId}`
          : '/api/volunteers';

        const res = await fetch(url, { credentials: 'include' });
        const data = await res.json();
        volunteers = data.volunteers || [];
        renderVolunteerList();
      } catch (err) {
        console.error('Error loading volunteers:', err);
      }
    }

    // Filter volunteers by precinct
    function filterVolunteers() {
      loadVolunteers();
    }

    // Render volunteer list
    function renderVolunteerList() {
      const list = document.getElementById('volunteerList');
      list.innerHTML = '';

      if (volunteers.length === 0) {
        list.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">No volunteers yet</p>';
        return;
      }

      volunteers.forEach(vol => {
        const item = document.createElement('div');
        item.className = `volunteer-item ${selectedVolunteer?.id === vol.id ? 'selected' : ''}`;
        item.onclick = () => selectVolunteer(vol);

        item.innerHTML = `
          <div class="volunteer-item-header">
            <div class="volunteer-name">${vol.name}</div>
            <div class="volunteer-badge">Active</div>
          </div>
          <div class="volunteer-meta">
            <div class="stat-item">
              <span class="stat-label">Assigned:</span>
              <span class="stat-value">${vol.assigned_count || 0}</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Visited:</span>
              <span class="stat-value">${vol.visited_count || 0}</span>
            </div>
          </div>
        `;

        list.appendChild(item);
      });
    }

    // Select volunteer
    async function selectVolunteer(vol) {
      selectedVolunteer = vol;
      renderVolunteerList();

      try {
        const res = await fetch(`/api/volunteers/${vol.id}`);
        const data = await res.json();
        displayVolunteerDetail(data.volunteer, data.assignments);
      } catch (err) {
        console.error('Error loading volunteer detail:', err);
      }
    }

    // Display volunteer detail
    function displayVolunteerDetail(vol, assignments) {
      const addSection = document.getElementById('addVolunteerSection');
      const detailSection = document.getElementById('volunteerDetailSection');
      const detailContent = document.getElementById('volunteerDetailContent');

      addSection.classList.add('hidden');
      detailSection.classList.remove('hidden');

      const visitedCount = assignments.filter(a => a.status === 'visited').length;
      const progressPct = assignments.length > 0
        ? Math.round((visitedCount / assignments.length) * 100)
        : 0;

      detailContent.innerHTML = `
        <div class="detail-header">
          <div>
            <h2>${vol.name}</h2>
            <div class="info-row" style="margin-top: 8px;">
              <span class="info-label">Phone:</span>
              <span class="info-value">${vol.phone || 'N/A'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Precinct:</span>
              <span class="info-value">${vol.precinct_name || 'N/A'}</span>
            </div>
          </div>
          <button class="btn btn-sm" onclick="deleteVolunteer(${vol.id})">Delete</button>
        </div>

        <div class="progress-stats">
          <div class="stat-card">
            <div class="stat-card-value">${assignments.length}</div>
            <div class="stat-card-label">Assigned</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-value">${visitedCount}</div>
            <div class="stat-card-label">Visited</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-value">${progressPct}%</div>
            <div class="stat-card-label">Progress</div>
          </div>
        </div>

        <div style="margin-top: 20px;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <span class="section-title">Assigned Voters</span>
            <button class="btn btn-sm" onclick="openAssignModal(${vol.id}, '${vol.name}')">+ Assign More</button>
          </div>
          <div class="assignments-list">
            ${assignments.length === 0
              ? '<div style="padding: 12px; text-align: center; color: var(--text-muted);">No assignments yet</div>'
              : assignments.map(a => `
                <div class="assignment-item">
                  <div class="assignment-name">${a.first_name} ${a.last_name}</div>
                  <div class="assignment-status ${a.status === 'visited' ? 'status-visited' : 'status-pending'}">
                    ${a.status}
                  </div>
                </div>
              `).join('')
            }
          </div>
        </div>
      `;
    }

    // Show add volunteer form
    function showAddVolunteerForm() {
      selectedVolunteer = null;
      const addSection = document.getElementById('addVolunteerSection');
      const detailSection = document.getElementById('volunteerDetailSection');

      addSection.classList.remove('hidden');
      detailSection.classList.add('hidden');
      renderVolunteerList();
    }

    // Create volunteer
    async function createVolunteer(e) {
      e.preventDefault();

      const name = document.getElementById('volName').value;
      const email = document.getElementById('volEmail').value;
      const phone = document.getElementById('volPhone').value;
      const precinctId = document.getElementById('volPrecinct').value;

      try {
        const res = await fetch('/api/volunteers', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            email,
            phone: phone || null,
            precinct_id: precinctId || null
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Failed to create volunteer');
        }

        const msg = document.getElementById('formMessage');
        msg.className = 'alert alert-success';
        msg.innerHTML = `✅ Volunteer created! Temp password: <strong>${data.account.tempPassword}</strong> (sent to ${email})`;

        resetForm();
        await loadVolunteers();

        setTimeout(() => {
          msg.innerHTML = '';
        }, 5000);
      } catch (err) {
        const msg = document.getElementById('formMessage');
        msg.className = 'alert alert-error';
        msg.textContent = '❌ ' + err.message;
      }
    }

    // Reset form
    function resetForm() {
      document.getElementById('volName').value = '';
      document.getElementById('volEmail').value = '';
      document.getElementById('volPhone').value = '';
      document.getElementById('volPrecinct').value = '';
      document.getElementById('formMessage').innerHTML = '';
    }

    // Delete volunteer
    async function deleteVolunteer(volId) {
      if (!confirm('Are you sure you want to delete this volunteer?')) return;

      try {
        const res = await fetch(`/api/volunteers/${volId}`, { method: 'DELETE' });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        selectedVolunteer = null;
        await loadVolunteers();
        showAddVolunteerForm();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // Open assign modal
    function openAssignModal(volId, volName) {
      document.getElementById('assignVolName').textContent = volName;
      document.getElementById('assignForm').dataset.volunteerId = volId;
      document.getElementById('assignModal').classList.add('active');
      document.getElementById('assignMessage').innerHTML = '';
    }

    // Close assign modal
    function closeAssignModal() {
      document.getElementById('assignModal').classList.remove('active');
      document.getElementById('assignForm').reset();
    }

    // Assign voters
    async function assignVoters(e) {
      e.preventDefault();

      const volunteerId = document.getElementById('assignForm').dataset.volunteerId;
      const precinct = document.getElementById('filterPrecinct').value;
      const party = document.getElementById('filterParty').value;
      const votedInYears = document.getElementById('filterVotedYears').value;
      const name = document.getElementById('filterName').value;

      try {
        const res = await fetch(`/api/volunteers/${volunteerId}/assign`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            precinct: precinct || null,
            party: party || null,
            votedInYears: votedInYears ? parseInt(votedInYears) : null,
            name: name || null
          })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        const msg = document.getElementById('assignMessage');
        msg.className = 'alert alert-success';
        msg.textContent = `✅ ${data.assigned} voters assigned (${data.total} matched filters)`;

        setTimeout(() => {
          closeAssignModal();
          selectedVolunteer && selectVolunteer(selectedVolunteer);
        }, 2000);
      } catch (err) {
        const msg = document.getElementById('assignMessage');
        msg.className = 'alert alert-error';
        msg.textContent = '❌ ' + err.message;
      }
    }

    // Navigation
    function goToDashboard() {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>

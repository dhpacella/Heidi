<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0F1419;
      color: #E8EBF0;
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }
    body.light-mode {
      background: #F5F5F5;
      color: #1A1A1A;
    }
    header {
      background: #1A3550;
      border-bottom: 2px solid #F5A623;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    body.light-mode header {
      background: #E8F1F8;
      border-bottom-color: #F5A623;
      color: #1A3550;
    }
    header h1 { font-size: 24px; font-weight: 700; color: #F5A623; }
    .header-right { display: flex; gap: 12px; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary { background: #F5A623; color: #1A3550; }
    .btn-primary:hover { background: #F0A000; }
    .btn-logout { background: #2A5070; color: #8BA3BE; }
    .btn-logout:hover { background: #3A6080; }
    body.light-mode .btn-logout { background: #D0E0EB; color: #1A3550; }
    body.light-mode .btn-logout:hover { background: #B8D5E5; }
    .btn-dark-toggle { background: transparent; color: #8BA3BE; border: 1px solid #8BA3BE; }
    body.light-mode .btn-dark-toggle { color: #1A3550; border-color: #1A3550; }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 24px;
    }
    .card {
      background: #1F2937;
      border: 1px solid #2D3E52;
      border-radius: 8px;
      padding: 24px;
    }
    body.light-mode .card {
      background: #FFFFFF;
      border-color: #E0E0E0;
    }
    .card h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #F5A623;
    }
    .volunteer-card {
      background: #252F3F;
      border: 1px solid #2D3E52;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    body.light-mode .volunteer-card {
      background: #F9F9F9;
      border-color: #E0E0E0;
    }
    .volunteer-card:hover {
      border-color: #F5A623;
      background: #2D3E52;
    }
    body.light-mode .volunteer-card:hover {
      background: #F5F5F5;
      border-color: #F5A623;
    }
    .volunteer-card.selected {
      border-color: #F5A623;
      background: #2D3E52;
    }
    body.light-mode .volunteer-card.selected {
      background: #E8F1F8;
      border-color: #F5A623;
    }
    .vol-name { font-weight: 600; margin-bottom: 4px; }
    .vol-meta { font-size: 12px; color: #888780; margin-bottom: 8px; }
    .progress-bar {
      background: #1A2534;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    body.light-mode .progress-bar {
      background: #E0E0E0;
    }
    .progress-fill {
      background: linear-gradient(90deg, #F5A623, #5DE0B0);
      height: 100%;
    }
    .vol-stats { font-size: 11px; color: #888780; margin-top: 6px; }
    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      background: #252F3F;
      color: #E8EBF0;
      border: 1px solid #2D3E52;
      border-radius: 6px;
      font-family: 'Barlow', sans-serif;
    }
    body.light-mode input,
    body.light-mode select {
      background: #FFFFFF;
      color: #1A1A1A;
      border-color: #E0E0E0;
    }
    input::placeholder {
      color: #888780;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #888780;
      margin-bottom: 6px;
    }
    .empty { text-align: center; padding: 24px; color: #888780; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 10px;
      border-bottom: 2px solid #F5A623;
      font-weight: 700;
      font-size: 11px;
      text-transform: uppercase;
      color: #F5A623;
    }
    td {
      padding: 10px;
      border-bottom: 1px solid #2D3E52;
    }
    body.light-mode td {
      border-bottom-color: #E0E0E0;
    }
    .status-pending { color: #F5A623; }
    .status-visited { color: #5DE0B0; }
  </style>
</head>
<body>
  <header>
    <h1>👥 Volunteer Manager</h1>
    <div class="header-right">
      <button class="btn btn-dark-toggle" onclick="toggleTheme()">🌙 Dark</button>
      <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">
    <!-- Left: Volunteer List -->
    <div>
      <div class="card">
        <h2>Volunteers</h2>
        <button class="btn btn-primary" onclick="showAddForm()" style="width: 100%; margin-bottom: 16px;">➕ Add Volunteer</button>
        <div id="volunteerList" class="empty">Loading volunteers...</div>
      </div>
    </div>

    <!-- Right: Selected Volunteer Detail -->
    <div>
      <div class="card">
        <h2 id="detailTitle">Select a volunteer to manage</h2>

        <!-- Add Volunteer Form -->
        <div id="addForm" style="display: none; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid #2D3E52;">
          <h3 style="color: #F5A623; margin-bottom: 12px;">New Volunteer</h3>
          <label>Name</label>
          <input type="text" id="newVolName" placeholder="Full name">
          <label>Email</label>
          <input type="email" id="newVolEmail" placeholder="email@example.com">
          <label>Phone</label>
          <input type="tel" id="newVolPhone" placeholder="(555) 123-4567">
          <label>Precinct</label>
          <input type="text" id="newVolPrecinct" placeholder="Precinct name or ID">
          <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary" onclick="saveNewVolunteer()" style="flex: 1;">Save Volunteer</button>
            <button class="btn" onclick="hideAddForm()" style="flex: 1; background: #2A5070; color: #8BA3BE;">Cancel</button>
          </div>
        </div>

        <!-- Volunteer Detail -->
        <div id="detailContent" style="display: none;">
          <div style="background: #252F3F; border-radius: 6px; padding: 16px; margin-bottom: 24px;">
            <div id="detailName" style="font-size: 18px; font-weight: 700; margin-bottom: 8px;"></div>
            <div id="detailMeta" style="font-size: 12px; color: #888780; margin-bottom: 12px;"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
              <div>
                <div style="font-size: 11px; color: #888780; text-transform: uppercase;">Assigned</div>
                <div style="font-size: 24px; font-weight: 700; color: #F5A623;" id="detailAssigned">0</div>
              </div>
              <div>
                <div style="font-size: 11px; color: #888780; text-transform: uppercase;">Visited</div>
                <div style="font-size: 24px; font-weight: 700; color: #5DE0B0;" id="detailVisited">0</div>
              </div>
            </div>
          </div>

          <!-- Filter & Assign Section -->
          <div style="background: #252F3F; border-radius: 6px; padding: 16px; margin-bottom: 24px;">
            <h3 style="color: #F5A623; margin-bottom: 12px;">Filter & Assign Voters</h3>
            <label>Precinct</label>
            <input type="text" id="filterPrecinct" placeholder="(leave blank for all)">
            <label>Party</label>
            <select id="filterParty">
              <option value="">All parties</option>
              <option value="democrat">Democrat</option>
              <option value="republican">Republican</option>
              <option value="independent">Independent</option>
            </select>
            <label>Voted in last X years</label>
            <input type="number" id="filterYears" value="3" min="1" max="20">
            <div style="display: flex; gap: 12px;">
              <button class="btn btn-primary" onclick="assignVoters(false)" style="flex: 1;">Assign Voters</button>
              <button class="btn btn-primary" onclick="assignVoters(true)" style="flex: 1; background: #FF6B6B;">Replace & Reassign</button>
            </div>
            <div id="assignMessage" style="margin-top: 12px; padding: 12px; border-radius: 6px; display: none;"></div>
          </div>

          <!-- Assignments List -->
          <div>
            <h3 style="color: #F5A623; margin-bottom: 12px;">Assigned Voters</h3>
            <div id="assignmentsList" class="empty">No assignments yet</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let selectedVolId = null;

    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      const isDark = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      document.querySelector('.btn-dark-toggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
    }

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark';
      if (saved === 'light') document.body.classList.add('light-mode');
      document.querySelector('.btn-dark-toggle').textContent = saved === 'light' ? '☀️ Light' : '🌙 Dark';
    }

    function logout() {
      fetch('/logout', { method: 'POST' }).then(() => window.location.href = '/login');
    }

    function showAddForm() {
      document.getElementById('addForm').style.display = 'block';
      document.getElementById('detailContent').style.display = 'none';
    }

    function hideAddForm() {
      document.getElementById('addForm').style.display = 'none';
    }

    async function loadVolunteers() {
      try {
        const res = await fetch('/api/volunteers');
        const data = await res.json();
        const volunteers = data.volunteers || [];

        if (volunteers.length === 0) {
          document.getElementById('volunteerList').innerHTML = '<div class="empty">No volunteers</div>';
          return;
        }

        let html = '';
        volunteers.forEach(vol => {
          const assigned = vol.assigned_count || 0;
          const visited = vol.visited_count || 0;
          const percent = assigned > 0 ? Math.round((visited / assigned) * 100) : 0;
          html += `
            <div class="volunteer-card" onclick="selectVolunteer(${vol.id}, '${vol.name}', ${assigned}, ${visited})">
              <div class="vol-name">${vol.name}</div>
              <div class="vol-meta">${vol.phone || 'No phone'} • ${vol.precinct || 'No precinct'}</div>
              <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
              <div class="vol-stats">${visited} / ${assigned} visited</div>
            </div>
          `;
        });
        document.getElementById('volunteerList').innerHTML = html;
      } catch (err) {
        console.error('Error loading volunteers:', err);
        document.getElementById('volunteerList').innerHTML = '<div class="empty">Error loading volunteers</div>';
      }
    }

    function selectVolunteer(id, name, assigned, visited) {
      selectedVolId = id;
      document.querySelectorAll('.volunteer-card').forEach(c => c.classList.remove('selected'));
      event.target.closest('.volunteer-card').classList.add('selected');

      document.getElementById('addForm').style.display = 'none';
      document.getElementById('detailContent').style.display = 'block';
      document.getElementById('detailTitle').textContent = name;
      document.getElementById('detailName').textContent = name;
      document.getElementById('detailAssigned').textContent = assigned;
      document.getElementById('detailVisited').textContent = visited;
      document.getElementById('detailMeta').textContent = `ID: ${id}`;

      loadAssignments(id);
    }

    async function loadAssignments(volId) {
      try {
        const res = await fetch(`/api/volunteers/${volId}`);
        const data = await res.json();
        const assignments = data.assignments || [];

        if (assignments.length === 0) {
          document.getElementById('assignmentsList').innerHTML = '<div class="empty">No assigned voters</div>';
          return;
        }

        const pending = assignments.filter(a => a.status === 'pending');
        const visited = assignments.filter(a => a.status === 'visited');

        let html = '<div style="margin-bottom: 16px;"><strong style="color: #F5A623;">Pending (' + pending.length + ')</strong><table><thead><tr><th>Name</th><th>Address</th><th>Party</th></tr></thead><tbody>';
        pending.slice(0, 5).forEach(a => {
          html += `<tr><td>${a.voter_name || '-'}</td><td>${a.voter_address || '-'}</td><td>${a.voter_party || '-'}</td></tr>`;
        });
        html += '</tbody></table></div>';

        if (visited.length > 0) {
          html += '<div><strong style="color: #5DE0B0;">Visited (' + visited.length + ')</strong><table><thead><tr><th>Name</th><th>Address</th><th>Visited</th></tr></thead><tbody>';
          visited.slice(0, 5).forEach(a => {
            html += `<tr><td>${a.voter_name || '-'}</td><td>${a.voter_address || '-'}</td><td>${a.visited_at || '-'}</td></tr>`;
          });
          html += '</tbody></table></div>';
        }

        document.getElementById('assignmentsList').innerHTML = html;
      } catch (err) {
        console.error('Error loading assignments:', err);
      }
    }

    async function assignVoters(replace) {
      if (!selectedVolId) {
        alert('Select a volunteer first');
        return;
      }

      const filters = {
        precinct: document.getElementById('filterPrecinct').value || undefined,
        party: document.getElementById('filterParty').value || undefined,
        votedInYears: parseInt(document.getElementById('filterYears').value) || 3
      };

      try {
        const res = await fetch(`/api/volunteers/${selectedVolId}/assign`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ voterFilters: filters, replaceExisting: replace })
        });
        const data = await res.json();
        const msg = document.getElementById('assignMessage');
        if (data.success) {
          msg.style.background = 'rgba(93, 224, 176, 0.15)';
          msg.style.color = '#5DE0B0';
          msg.textContent = `✅ Assigned ${data.count || 0} voters`;
          msg.style.display = 'block';
          loadVolunteers();
          loadAssignments(selectedVolId);
        } else {
          msg.style.background = 'rgba(255, 107, 107, 0.15)';
          msg.style.color = '#FF6B6B';
          msg.textContent = `❌ ${data.error || 'Error assigning voters'}`;
          msg.style.display = 'block';
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function saveNewVolunteer() {
      const name = document.getElementById('newVolName').value.trim();
      const email = document.getElementById('newVolEmail').value.trim();
      const phone = document.getElementById('newVolPhone').value.trim();
      const precinct = document.getElementById('newVolPrecinct').value.trim();

      if (!name || !email) {
        alert('Name and email are required');
        return;
      }

      try {
        const res = await fetch('/api/admin/create-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email, name, password: 'TempPassword123!', role: 'volunteer',
            phone, precinct
          })
        });
        const data = await res.json();
        if (data.success) {
          alert('✅ Volunteer created');
          document.getElementById('newVolName').value = '';
          document.getElementById('newVolEmail').value = '';
          document.getElementById('newVolPhone').value = '';
          document.getElementById('newVolPrecinct').value = '';
          hideAddForm();
          loadVolunteers();
        } else {
          alert('❌ Error: ' + (data.error || 'Unknown error'));
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    initTheme();
    loadVolunteers();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Portal - Heidi Voter Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --navy: #0B1929;
      --navy-mid: #122338;
      --navy-light: #1A3550;
      --gold: #F5A623;
      --gold-light: #FBBF48;
      --green: #1DB87A;
      --red: #E03434;
      --text: #EEF2F7;
      --text-muted: #8BA3BE;
      --border: #243D56;
      --surface: #122338;
      --surface-2: #1A3550;
    }

    body.light-theme {
      --navy: #F5F5F5;
      --navy-mid: #FFFFFF;
      --navy-light: #F0F0F0;
      --text: #1A1A1A;
      --text-muted: #666666;
      --border: #DDDDDD;
      --surface: #FFFFFF;
      --surface-2: #F9F9F9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .page-header {
      background: linear-gradient(135deg, #0B1929 0%, #122338 40%, #1A3550 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 24px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .page-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), #F5A62300);
    }

    .header-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .header-nav h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(29, 184, 122, 0.2);
      border: 1px solid var(--green);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--green);
    }

    .status-badge.inactive {
      background: rgba(224, 52, 52, 0.2);
      border-color: var(--red);
      color: var(--red);
    }

    .gps-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .gps-indicator.inactive {
      background: var(--red);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .btn {
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--navy-light);
      color: var(--text);
    }

    .btn:hover {
      background: var(--gold);
      color: var(--navy);
      border-color: var(--gold);
    }

    .btn-danger {
      background: var(--red);
      color: white;
      border-color: var(--red);
    }

    .btn-danger:hover {
      background: #d02828;
    }

    /* ── Main Layout ── */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 24px;
      height: calc(100vh - 200px);
    }

    /* ── Left: Voter List ── */
    .voter-list-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .voter-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .voter-item {
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .voter-item:hover {
      background: var(--surface-2);
      border-color: var(--gold);
    }

    .voter-item.selected {
      background: var(--surface-2);
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.2);
    }

    .voter-item.visited {
      border-color: var(--green);
      background: rgba(29, 184, 122, 0.1);
    }

    .voter-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .voter-address {
      font-size: 12px;
      color: var(--text-muted);
    }

    .voter-status {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .status-tag {
      display: inline-block;
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
    }

    .status-tag.pending {
      background: rgba(245, 166, 35, 0.2);
      color: var(--gold);
    }

    .status-tag.visited {
      background: rgba(29, 184, 122, 0.2);
      color: var(--green);
    }

    /* ── Right: Map ── */
    .map-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #map {
      flex: 1;
      z-index: 2;
    }

    /* ── Modal ── */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .voter-details {
      background: var(--navy-light);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .detail-label {
      color: var(--text-muted);
    }

    .detail-value {
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      resize: vertical;
      min-height: 60px;
    }

    .preset-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .preset-btn {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--navy-light);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      font-weight: 500;
    }

    .preset-btn:hover {
      background: var(--gold);
      color: var(--navy);
      border-color: var(--gold);
    }

    .status-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .status-btn {
      padding: 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--navy-light);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .status-btn:hover {
      border-color: var(--gold);
      background: var(--surface-2);
    }

    .status-btn.selected {
      border-color: var(--gold);
      background: var(--gold);
      color: var(--navy);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .modal-actions button {
      flex: 1;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .alert-success {
      background: rgba(29, 184, 122, 0.2);
      color: var(--green);
      border: 1px solid rgba(29, 184, 122, 0.3);
    }

    .alert-error {
      background: rgba(224, 52, 52, 0.2);
      color: var(--red);
      border: 1px solid rgba(224, 52, 52, 0.3);
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--text-muted);
    }

    @media (max-width: 1024px) {
      .main-layout {
        grid-template-columns: 1fr;
        height: auto;
      }

      .voter-list-section,
      .map-section {
        height: 400px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="page-header">
      <div class="header-nav">
        <h1>📍 Your Canvassing Route</h1>
        <div class="header-controls">
          <div class="status-badge" id="gpsStatus">
            <div class="gps-indicator" id="gpsIndicator"></div>
            <span id="gpsStatusText">GPS: Starting...</span>
          </div>
          <button class="btn" onclick="toggleTheme()">🌙</button>
          <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Left: Voter List -->
      <div class="voter-list-section">
        <div class="section-title">📋 Your Assigned Voters</div>
        <div class="voter-list" id="voterList"></div>
      </div>

      <!-- Right: Map -->
      <div class="map-section">
        <div id="map"></div>
      </div>
    </div>
  </div>

  <!-- Modal: Update Voter Status -->
  <div class="modal" id="updateModal">
    <div class="modal-content">
      <div class="modal-header">Update Visit Status</div>

      <div class="voter-details" id="voterDetails"></div>

      <form onsubmit="updateVoterStatus(event)" id="updateForm">
        <div class="form-group">
          <label>Visit Status</label>
          <div class="status-options">
            <button type="button" class="status-btn" data-status="visited" onclick="selectStatus(event)">✅ Visited</button>
            <button type="button" class="status-btn" data-status="not_interested" onclick="selectStatus(event)">❌ Not Interested</button>
          </div>
        </div>

        <div class="form-group">
          <label>Already Canvassed By Someone Else?</label>
          <div class="status-options">
            <button type="button" class="status-btn" data-canvassed="false" onclick="selectCanvassed(event)">No</button>
            <button type="button" class="status-btn" data-canvassed="true" onclick="selectCanvassed(event)">Yes</button>
          </div>
        </div>

        <div class="form-group" id="concernsSection" style="display: none;">
          <label>Concerns</label>
          <div class="preset-buttons" id="presetConcerns"></div>
        </div>

        <div class="form-group">
          <label>Notes (Optional)</label>
          <textarea id="updateNotes" placeholder="Add any notes about this visit..."></textarea>
        </div>

        <div class="modal-actions">
          <button type="submit" class="btn" style="background: var(--green); color: white; border-color: var(--green);">Save</button>
          <button type="button" class="btn" onclick="closeModal()">Cancel</button>
        </div>

        <div id="updateMessage"></div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let volunteerId = null;
    let assignments = [];
    let map = null;
    let markers = {};
    let gpsWatchId = null;
    let gpsTimer = null;
    let selectedVoter = null;
    let selectedStatus = null;
    let selectedCanvassed = null;
    const PRESET_CONCERNS = [
      'Refuses to speak',
      'Not interested',
      'Prefers phone/email',
      'Already voting for us',
      'Do not contact'
    ];

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      await getVolunteerInfo();
      loadTheme();
      initMap();
      startGPS();
      loadAssignments();
    });

    // Get volunteer info from session
    async function getVolunteerInfo() {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        const data = await res.json();
        if (data.user) {
          // Query volunteers table for this user
          const volRes = await fetch('/api/volunteers', { credentials: 'include' });
          const volData = await volRes.json();
          const volunteers = volData.volunteers || [];
          const vol = volunteers.find(v => v.user_id === data.user.id);
          volunteerId = vol?.id;
        }
      } catch (err) {
        console.error('Error getting volunteer info:', err);
      }
    }

    // Load assignments
    async function loadAssignments() {
      if (!volunteerId) return;

      try {
        const res = await fetch(`/api/volunteers/${volunteerId}`);
        const data = await res.json();
        assignments = data.assignments || [];
        renderVoterList();
        addMarkers();
      } catch (err) {
        console.error('Error loading assignments:', err);
      }
    }

    // Render voter list
    function renderVoterList() {
      const list = document.getElementById('voterList');
      list.innerHTML = '';

      if (assignments.length === 0) {
        list.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">No assigned voters yet</div>';
        return;
      }

      assignments.forEach(a => {
        const item = document.createElement('div');
        item.className = `voter-item ${selectedVoter?.voter_id === a.voter_id ? 'selected' : ''} ${a.status === 'visited' ? 'visited' : ''}`;
        item.onclick = () => selectVoter(a);

        item.innerHTML = `
          <div class="voter-name">${a.first_name} ${a.last_name}</div>
          <div class="voter-address">📍 ${a.address || 'Address unknown'}</div>
          <div class="voter-status">
            <span class="status-tag ${a.status === 'visited' ? 'visited' : 'pending'}">
              ${a.status === 'visited' ? '✅ Visited' : '⏳ Pending'}
            </span>
            ${a.already_canvassed ? '<span class="status-tag visited">Already Canvassed</span>' : ''}
          </div>
        `;

        list.appendChild(item);
      });
    }

    // Select voter
    function selectVoter(assignment) {
      selectedVoter = assignment;
      renderVoterList();
      if (markers[assignment.voter_id]) {
        markers[assignment.voter_id].openPopup();
      }
    }

    // Initialize map
    function initMap() {
      map = L.map('map').setView([40.7128, -74.0060], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
      }).addTo(map);
    }

    // Add markers to map
    function addMarkers() {
      assignments.forEach(a => {
        if (a.address) {
          // Geocode address - for now use placeholder. In production, use proper geocoding
          const lat = 40.7128 + (Math.random() - 0.5) * 0.05;
          const lng = -74.0060 + (Math.random() - 0.5) * 0.05;

          const color = a.status === 'visited' ? '#1DB87A' : '#F5A623';
          const html = `<div style="width: 30px; height: 30px; background: ${color}; border-radius: 50%; border: 3px solid white; cursor: pointer;"></div>`;

          const marker = L.marker([lat, lng], {
            icon: L.divIcon({
              html: html,
              iconSize: [30, 30],
              className: 'custom-marker'
            })
          }).bindPopup(`<strong>${a.first_name} ${a.last_name}</strong><br>${a.address || 'Unknown'}`).addTo(map);

          marker.on('click', () => selectVoter(a));
          markers[a.voter_id] = marker;
        }
      });
    }

    // Theme toggle
    function toggleTheme() {
      document.body.classList.toggle('light-theme');
      localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }

    function loadTheme() {
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
      }
    }

    // GPS Tracking
    function startGPS() {
      if (!volunteerId) return;

      const updateStatus = (text, active = false) => {
        document.getElementById('gpsStatusText').textContent = text;
        const indicator = document.getElementById('gpsIndicator');
        const badge = document.getElementById('gpsStatus');
        if (active) {
          indicator.classList.remove('inactive');
          badge.classList.remove('inactive');
        } else {
          indicator.classList.add('inactive');
          badge.classList.add('inactive');
        }
      };

      if ('geolocation' in navigator) {
        updateStatus('GPS: Acquiring...', true);

        gpsWatchId = navigator.geolocation.watchPosition(
          (position) => {
            updateStatus('GPS: Active', true);
            const { latitude, longitude } = position.coords;
            logGPS(latitude, longitude);
          },
          (error) => {
            updateStatus('GPS: Error', false);
            console.error('GPS error:', error);
          },
          {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 10000
          }
        );

        // Also log every 60 seconds as backup
        gpsTimer = setInterval(() => {
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
              const { latitude, longitude } = pos.coords;
              logGPS(latitude, longitude);
            });
          }
        }, 60000);
      } else {
        updateStatus('GPS: Not available', false);
      }
    }

    function stopGPS() {
      if (gpsWatchId) {
        navigator.geolocation.clearWatch(gpsWatchId);
      }
      if (gpsTimer) {
        clearInterval(gpsTimer);
      }
    }

    function logGPS(latitude, longitude) {
      if (!volunteerId) return;

      fetch(`/api/volunteers/${volunteerId}/gps`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ latitude, longitude })
      }).catch(err => console.error('GPS log error:', err));
    }

    // Update voter status
    function selectStatus(e) {
      e.preventDefault();
      document.querySelectorAll('[data-status]').forEach(btn => btn.classList.remove('selected'));
      e.target.classList.add('selected');
      selectedStatus = e.target.dataset.status;

      // Show concerns only if visited
      const concernsSection = document.getElementById('concernsSection');
      if (selectedStatus === 'visited') {
        concernsSection.style.display = 'block';
      } else {
        concernsSection.style.display = 'none';
      }
    }

    function selectCanvassed(e) {
      e.preventDefault();
      document.querySelectorAll('[data-canvassed]').forEach(btn => btn.classList.remove('selected'));
      e.target.classList.add('selected');
      selectedCanvassed = e.target.dataset.canvassed === 'true';
    }

    function openModal(assignment) {
      selectedVoter = assignment;
      selectedStatus = null;
      selectedCanvassed = false;

      // Show voter details
      document.getElementById('voterDetails').innerHTML = `
        <div class="detail-row">
          <span class="detail-label">Name:</span>
          <span class="detail-value">${assignment.first_name} ${assignment.last_name}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Address:</span>
          <span class="detail-value">${assignment.address || 'Unknown'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Phone:</span>
          <span class="detail-value">${assignment.phone || 'Unknown'}</span>
        </div>
      `;

      // Reset form
      document.getElementById('updateForm').reset();
      document.querySelectorAll('[data-status], [data-canvassed]').forEach(btn => btn.classList.remove('selected'));
      document.getElementById('updateNotes').value = assignment.notes || '';

      // Populate concerns
      const concernsHtml = PRESET_CONCERNS.map(c => `
        <button type="button" class="preset-btn" onclick="toggleConcern(event, '${c}')">${c}</button>
      `).join('');
      document.getElementById('presetConcerns').innerHTML = concernsHtml;

      document.getElementById('updateModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('updateModal').classList.remove('active');
      selectedStatus = null;
      selectedCanvassed = null;
    }

    function toggleConcern(e, concern) {
      e.preventDefault();
      e.target.style.opacity = e.target.style.opacity === '0.5' ? '1' : '0.5';
    }

    async function updateVoterStatus(e) {
      e.preventDefault();

      if (!selectedVoter || !volunteerId) return;

      const selectedConcerns = Array.from(document.querySelectorAll('[onclick*="toggleConcern"]'))
        .filter(btn => btn.style.opacity === '0.5')
        .map(btn => btn.textContent);

      const notes = document.getElementById('updateNotes').value;

      try {
        const res = await fetch(`/api/volunteers/${volunteerId}/assignments/${selectedVoter.id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            status: selectedStatus || 'pending',
            notes,
            concerns: selectedConcerns,
            alreadyCanvassed: selectedCanvassed
          })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        const msg = document.getElementById('updateMessage');
        msg.className = 'alert alert-success';
        msg.textContent = '✅ Status updated!';

        setTimeout(() => {
          closeModal();
          loadAssignments();
        }, 1000);
      } catch (err) {
        const msg = document.getElementById('updateMessage');
        msg.className = 'alert alert-error';
        msg.textContent = '❌ ' + err.message;
      }
    }

    // Logout
    function logout() {
      stopGPS();
      window.location.href = '/logout';
    }

    // Click voter list item to open modal
    document.addEventListener('click', (e) => {
      if (e.target.closest('.voter-item') && !e.target.closest('.status-tag')) {
        const item = e.target.closest('.voter-item');
        const assignment = assignments[Array.from(document.querySelectorAll('.voter-item')).indexOf(item)];
        if (assignment) openModal(assignment);
      }
    });
  </script>
</body>
</html>

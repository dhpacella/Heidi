<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email History</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0B1929;
      --navy-mid: #122338;
      --navy-light: #1A3550;
      --gold: #F5A623;
      --gold-light: #FBBF48;
      --text: #EEF2F7;
      --text-muted: #8BA3BE;
      --surface: #122338;
      --surface-2: #1A3550;
      --border: rgba(245, 166, 35, 0.2);
    }

    body.light-mode {
      --navy: #F5F5F5;
      --navy-mid: #FFFFFF;
      --navy-light: #F0F0F0;
      --text: #1A1A1A;
      --text-muted: #666666;
      --surface: #FFFFFF;
      --surface-2: #F9F9F9;
      --border: rgba(245, 166, 35, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: var(--navy-mid);
      border-bottom: 3px solid var(--gold);
      padding: 20px 32px;
      border-radius: 0;
      margin: -20px -20px 30px -20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    header h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 32px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gold);
      flex: 1;
      min-width: 250px;
    }

    .header-left, .header-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 10px 18px;
      border: 1px solid var(--gold);
      border-radius: 6px;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--gold);
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: rgba(245, 166, 35, 0.1);
      border-color: var(--gold-light);
    }

    .btn-dark-toggle {
      background: rgba(245, 166, 35, 0.1);
      border-color: var(--gold);
    }

    .btn-logout {
      background: rgba(255, 77, 109, 0.15);
      color: #FF4D6D;
      border-color: #FF4D6D;
    }

    .btn-logout:hover {
      background: rgba(255, 77, 109, 0.25);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    th {
      background: var(--surface-2);
      color: var(--gold);
      padding: 14px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    tr:hover {
      background: rgba(245, 166, 35, 0.05);
    }

    .subject-preview {
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .cost {
      color: var(--gold);
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .error {
      background: rgba(255, 77, 109, 0.1);
      color: #FF4D6D;
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
      border: 1px solid rgba(255, 77, 109, 0.3);
      font-size: 13px;
    }

    .pagination {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .pagination button, .pagination span {
      padding: 8px 16px;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Barlow', sans-serif;
      transition: all 0.2s;
      font-size: 13px;
    }

    .pagination button:hover {
      background: rgba(245, 166, 35, 0.1);
      border-color: var(--gold-light);
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination span {
      border: none;
      cursor: default;
      color: var(--text-muted);
    }

    .modal-recipients {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-recipients.show {
      display: flex;
    }

    .modal-recipients-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      max-width: 700px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    .modal-recipients h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .recipients-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .recipients-table th {
      background: var(--surface-2);
      color: var(--gold);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .recipients-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .recipients-table tr:hover {
      background: rgba(245, 166, 35, 0.05);
    }

    .status-sent {
      color: #5DE0B0;
      font-weight: 600;
    }

    .status-failed {
      color: #FF4D6D;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        text-align: center;
      }

      header h1 {
        flex: none;
        min-width: auto;
        font-size: 24px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px;
      }

      .subject-preview {
        max-width: 150px;
      }

      .header-left, .header-right {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <a href="/dashboard" class="btn">← Dashboard</a>
        <a href="/email-compose" class="btn">📧 New Email</a>
      </div>
      <h1>📧 Email History</h1>
      <div class="header-right">
        <button class="btn btn-dark-toggle" onclick="toggleTheme()">🌙 Dark</button>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
      </div>
    </header>

    <div id="content">
      <div class="loading">Loading email history...</div>
    </div>
  </div>

  <!-- Recipients Modal -->
  <div id="recipientsModal" class="modal-recipients">
    <div class="modal-recipients-content">
      <h2>📧 Recipients</h2>
      <div id="recipientsLoading" style="text-align: center; padding: 20px; color: var(--text-muted);">Loading...</div>
      <table id="recipientsTable" class="recipients-table" style="display: none;">
        <thead>
          <tr>
            <th>Email</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="recipientsBody"></tbody>
      </table>
      <div style="text-align: right;">
        <button class="btn" onclick="closeRecipients()" style="padding: 8px 16px; font-size: 13px;">Close</button>
      </div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      const isDark = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      document.querySelector('.btn-dark-toggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
    }

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark';
      if (saved === 'light') document.body.classList.add('light-mode');
      document.querySelector('.btn-dark-toggle').textContent = saved === 'light' ? '☀️ Light' : '🌙 Dark';
    }

    function logout() {
      fetch('/logout', { method: 'POST' }).then(() => window.location.href = '/login');
    }

    async function loadBlasts(page = 1) {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Loading email history...</div>';

      try {
        const response = await fetch(`/api/email/blasts?page=${page}`);

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();

        if (!data.blasts || data.blasts.length === 0) {
          content.innerHTML = '<div class="empty-state"><p>No emails sent yet. <a href="/email-compose" style="color: var(--gold); text-decoration: underline;">Create one now</a></p></div>';
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>Date Sent</th>
                <th>Subject</th>
                <th>Recipients</th>
                <th>Cost</th>
                <th>Sender</th>
              </tr>
            </thead>
            <tbody>
        `;

        data.blasts.forEach(blast => {
          const date = new Date(blast.created_at).toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
          const preview = (blast.subject || '').substring(0, 60) + (blast.subject.length > 60 ? '...' : '');
          const cost = `$${parseFloat(blast.total_cost || 0).toFixed(4)}`;

          html += `
            <tr onclick="showRecipients(${blast.id})" style="cursor: pointer;">
              <td>${date}</td>
              <td class="subject-preview" title="${blast.subject}">${preview}</td>
              <td>${blast.recipient_count.toLocaleString()}</td>
              <td class="cost">${cost}</td>
              <td>${blast.sender_name || 'Unknown'}</td>
            </tr>
          `;
        });

        html += `
            </tbody>
          </table>
        `;

        if (data.pages > 1) {
          html += '<div class="pagination">';
          if (page > 1) {
            html += `<button onclick="loadBlasts(${page - 1})">← Previous</button>`;
          }
          html += `<span>Page ${page} of ${data.pages}</span>`;
          if (page < data.pages) {
            html += `<button onclick="loadBlasts(${page + 1})">Next →</button>`;
          }
          html += '</div>';
        }

        content.innerHTML = html;
      } catch (err) {
        console.error('Error loading blasts:', err);
        content.innerHTML = `<div class="error">Error loading email history: ${err.message}</div>`;
      }
    }

    async function showRecipients(blastId) {
      const modal = document.getElementById('recipientsModal');
      const loading = document.getElementById('recipientsLoading');
      const table = document.getElementById('recipientsTable');
      const tbody = document.getElementById('recipientsBody');

      modal.classList.add('show');
      loading.style.display = 'block';
      table.style.display = 'none';

      try {
        const response = await fetch(`/api/email/blasts/${blastId}/recipients`);
        const data = await response.json();

        tbody.innerHTML = '';
        if (data.recipients && data.recipients.length > 0) {
          data.recipients.forEach(recipient => {
            const tr = document.createElement('tr');
            const statusClass = recipient.status === 'sent' ? 'status-sent' : 'status-failed';
            tr.innerHTML = `
              <td>${recipient.email}</td>
              <td>${recipient.first_name || '-'}</td>
              <td>${recipient.last_name || '-'}</td>
              <td class="${statusClass}">${recipient.status}</td>
            `;
            tbody.appendChild(tr);
          });
        } else {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">No recipients found</td></tr>';
        }

        loading.style.display = 'none';
        table.style.display = 'table';
      } catch (err) {
        console.error('Error loading recipients:', err);
        loading.textContent = 'Error loading recipients: ' + err.message;
      }
    }

    function closeRecipients() {
      document.getElementById('recipientsModal').classList.remove('show');
    }

    window.addEventListener('click', (e) => {
      const modal = document.getElementById('recipientsModal');
      if (e.target === modal) {
        closeRecipients();
      }
    });

    initTheme();
    loadBlasts();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rules — Heidi Pacella</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B1929;
      --navy-mid: #122338;
      --navy-light: #1A3550;
      --gold: #F5A623;
      --text: #EEF2F7;
      --text-muted: #8BA3BE;
      --green: #1DB87A;
      --surface: #122338;
    }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--text);
      padding: 30px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 2px solid rgba(245, 166, 35, 0.2);
    }
    h1 { font-size: 28px; color: var(--gold); font-weight: 700; }
    .btn {
      padding: 10px 16px;
      border: 1px solid var(--gold);
      background: rgba(245, 166, 35, 0.1);
      color: var(--gold);
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background: rgba(245, 166, 35, 0.2); }
    .btn-primary { background: var(--gold); color: var(--navy); }
    .btn-primary:hover { background: #FBBF48; }
    .rules-list { display: grid; gap: 15px; }
    .rule-item {
      background: var(--navy-mid);
      border: 1px solid rgba(245, 166, 35, 0.1);
      border-radius: 8px;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .rule-info h3 { color: var(--gold); margin-bottom: 8px; }
    .rule-info p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
    .rule-actions { display: flex; gap: 8px; }
    .rule-actions button { padding: 6px 12px; font-size: 12px; }
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(29, 184, 122, 0.2);
      color: var(--green);
      border-radius: 3px;
      font-weight: 600;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚙️ Automation Rules</h1>
      <p style="color: var(--text-muted); margin-top: 4px;">Set up automatic actions based on subscriber behavior</p>
    </div>

    <div style="margin-bottom: 20px;">
      <button class="btn btn-primary" onclick="createRule()">➕ New Rule</button>
      <button class="btn" onclick="history.back()">← Back</button>
    </div>

    <div class="rules-list" id="rules-list">
      <!-- Populated by JavaScript -->
    </div>
  </div>

  <script>
    const rules = [
      {
        name: 'Welcome Email on Subscribe',
        trigger: 'When someone subscribes',
        action: 'Send welcome email immediately',
        status: 'Active'
      },
      {
        name: 'Remove Unopened After 30 Days',
        trigger: 'Email not opened in 30 days',
        action: 'Move to inactive list',
        status: 'Active'
      },
      {
        name: 'Auto-Unsubscribe Bounced',
        trigger: 'Email bounces permanently',
        action: 'Automatically unsubscribe user',
        status: 'Active'
      },
      {
        name: 'Re-engagement Campaign',
        trigger: 'Inactive for 60 days',
        action: 'Send re-engagement email',
        status: 'Active'
      },
    ];

    function renderRules() {
      const list = document.getElementById('rules-list');
      list.innerHTML = rules.map((rule, idx) => `
        <div class="rule-item">
          <div class="rule-info">
            <h3>${rule.name} <span class="status-badge">${rule.status}</span></h3>
            <p>
              <strong>Trigger:</strong> ${rule.trigger}<br>
              <strong>Action:</strong> ${rule.action}
            </p>
          </div>
          <div class="rule-actions">
            <button class="btn" onclick="editRule(${idx})">✏️ Edit</button>
            <button class="btn" onclick="toggleRule(${idx})">🔄 ${rule.status === 'Active' ? 'Pause' : 'Resume'}</button>
            <button class="btn" onclick="deleteRule(${idx})" style="border-color: #E03434; color: #E03434;">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function createRule() {
      alert('Rule creation coming soon!');
    }

    function editRule(idx) {
      alert(`Editing: ${rules[idx].name}`);
    }

    function toggleRule(idx) {
      rules[idx].status = rules[idx].status === 'Active' ? 'Paused' : 'Active';
      renderRules();
    }

    function deleteRule(idx) {
      if (confirm(`Delete rule "${rules[idx].name}"?`)) {
        rules.splice(idx, 1);
        renderRules();
      }
    }

    renderRules();
  </script>
</body>
</html>

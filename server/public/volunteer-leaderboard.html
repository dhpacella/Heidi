<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Barlow', sans-serif;
      background: #0F1419;
      color: #E8EBF0;
      line-height: 1.6;
      transition: background 0.3s, color 0.3s;
    }
    body.light-mode {
      background: #F5F5F5;
      color: #1A1A1A;
    }
    header {
      background: #1A3550;
      border-bottom: 2px solid #F5A623;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    body.light-mode header {
      background: #E8F1F8;
      border-bottom-color: #F5A623;
      color: #1A3550;
    }
    header h1 { font-size: 24px; font-weight: 700; color: #F5A623; }
    .header-right { display: flex; gap: 12px; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-logout { background: #2A5070; color: #8BA3BE; }
    .btn-logout:hover { background: #3A6080; }
    body.light-mode .btn-logout { background: #D0E0EB; color: #1A3550; }
    body.light-mode .btn-logout:hover { background: #B8D5E5; }
    .btn-dark-toggle { background: transparent; color: #8BA3BE; border: 1px solid #8BA3BE; }
    body.light-mode .btn-dark-toggle { color: #1A3550; border-color: #1A3550; }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: #1F2937;
      border: 1px solid #2D3E52;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    body.light-mode .card {
      background: #FFFFFF;
      border-color: #E0E0E0;
    }
    .card h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #F5A623;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 12px;
      border-bottom: 2px solid #F5A623;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #F5A623;
    }
    td {
      padding: 16px 12px;
      border-bottom: 1px solid #2D3E52;
    }
    body.light-mode td {
      border-bottom-color: #E0E0E0;
    }
    tr:hover {
      background: #252F3F;
    }
    body.light-mode tr:hover {
      background: #F9F9F9;
    }
    .rank { font-size: 18px; font-weight: 700; color: #F5A623; width: 40px; }
    .name { font-weight: 600; }
    .progress-bar {
      background: #2D3E52;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    body.light-mode .progress-bar {
      background: #E0E0E0;
    }
    .progress-fill {
      background: linear-gradient(90deg, #F5A623, #5DE0B0);
      height: 100%;
      transition: width 0.3s;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 18px; font-weight: 700; color: #5DE0B0; }
    .stat-label { font-size: 11px; color: #888780; text-transform: uppercase; }
    .empty { text-align: center; padding: 40px; color: #888780; }
    .error { color: #FF6B6B; }
  </style>
</head>
<body>
  <header>
    <h1>🏆 Volunteer Leaderboard</h1>
    <div class="header-right">
      <button class="btn btn-dark-toggle" onclick="toggleTheme()">🌙 Dark</button>
      <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <h2>Top Volunteers by Visits</h2>
      <div id="leaderboardContainer">
        <div class="empty">Loading volunteer data...</div>
      </div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      const isDark = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      document.querySelector('.btn-dark-toggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
    }

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'dark';
      if (saved === 'light') document.body.classList.add('light-mode');
      document.querySelector('.btn-dark-toggle').textContent = saved === 'light' ? '☀️ Light' : '🌙 Dark';
    }

    function logout() {
      fetch('/logout', { method: 'POST' }).then(() => window.location.href = '/login');
    }

    async function loadLeaderboard() {
      try {
        const res = await fetch('/api/volunteers');
        const data = await res.json();

        if (!data.volunteers || data.volunteers.length === 0) {
          document.getElementById('leaderboardContainer').innerHTML = '<div class="empty">No volunteers yet</div>';
          return;
        }

        const sorted = data.volunteers
          .sort((a, b) => (b.visited_count || 0) - (a.visited_count || 0));

        let html = '<table><thead><tr><th>Rank</th><th>Name</th><th>Assigned</th><th>Visited</th><th>Progress</th><th>%</th></tr></thead><tbody>';

        sorted.forEach((vol, idx) => {
          const assigned = vol.assigned_count || 0;
          const visited = vol.visited_count || 0;
          const percent = assigned > 0 ? Math.round((visited / assigned) * 100) : 0;
          const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '';

          html += `
            <tr>
              <td class="rank">${medal || (idx + 1)}</td>
              <td class="name">${vol.name || 'Unknown'}</td>
              <td class="stat">${assigned}</td>
              <td class="stat"><span class="stat-value">${visited}</span></td>
              <td>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${percent}%"></div>
                </div>
              </td>
              <td class="stat">${percent}%</td>
            </tr>
          `;
        });

        html += '</tbody></table>';
        document.getElementById('leaderboardContainer').innerHTML = html;
      } catch (err) {
        console.error('Error loading leaderboard:', err);
        document.getElementById('leaderboardContainer').innerHTML = `<div class="empty error">Error loading leaderboard: ${err.message}</div>`;
      }
    }

    initTheme();
    loadLeaderboard();
    setInterval(loadLeaderboard, 10000);
  </script>
</body>
</html>
